[package]
name = "social-novel"
version = "0.0.1"
authors = ["Trung Do <dothanhtrung@pm.me>"]
edition = "2021"

[dependencies]
actix-files = "0.6"
actix-http = "3.2"
actix-multipart = "0.7"
actix-web = "4"
async-recursion = "1.0.0"
async-std = "1.10.0"
clap = { version = "4.5", features = ["derive"] }
configparser = "3.0"
dotenvy = "0.15"
futures = "0.3.17"
md-5 = "0.10"
serde = {version = "1.0", features = ["derive"]}
serde_json = {version = "1.0"}
sqlx = { version = "0.8", features = ["runtime-async-std-native-tls", "postgres", "time"] }
tera = "1.8.0"
walkdir = "2"
anyhow = "1.0"
log = "0.4"

[profile.dev.package.sqlx-macros]
opt-level = 3