[package]
name = "social-novel"
version = "0.0.3"
authors = ["Trung Do <dothanhtrung@pm.me>"]
edition = "2024"

[lib]
name = "sn_internal"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
actix-web = { version = "4.12" }
actix-files = "0.6"
actix-multipart = { version = "0.7" }
actix-cors = "0.7"
actix-web-lab = "0.24"
clap = { version = "4.5", features = ["derive"] }
ron = "0.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.49", features = ["rt-multi-thread", "macros"] }
tokio-stream = {version = "0.1"}
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "time", "migrate"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tera = "1.20"
jwalk = "0.8"
#sha2 = "0.11.0-rc"
blake3 = "1.8"
#hex = "0.4"
reqwest = { version = "0.13", default-features = false, features = ["blocking", "json", "stream", "rustls"] }
dotenvy = "0.15"
infer = "0.19"
indexmap = "2.13"
parking_lot = "0.12"
futures-util = "0.3.31"

[target.'cfg(target_os = "linux")'.dependencies]
tikv-jemallocator = "0.6"

[features]
default = ["postgres"]
postgres = ["sqlx/postgres"]
sqlite = ["sqlx/sqlite"]

[profile.dev.package.sqlx-macros]
opt-level = 3