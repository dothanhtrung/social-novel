<!--
Fake Facebook Messenger like page.

* The view allow to select main character, whose chat will be display at the right side while other characters's chat is on the left side.
    * The dropdown list is searchable

* Left side bar: List of chat room which the main character is in. If the main character is "admin", show all.
    * At the top is button to create new room
    * Room list show room name with its image is combine of its random four members at max.
    * If there are only 2 members in a chat room. The room name will be the name of not-main-character name.

* Middle main content: Chat content which is Post for specific room id.
    * Each message show its reaction if any (liked, haha, loved, surprised, sad)
    * Hover mouse on message will show:
        * "Edit" icon to enter edit mode to edit that message. POST "/api/post".
        * "Trash" icon to delete message. GET "/api/post/delete/{post_id}".
    * Background of chat room is "/data/background/{room_id}.png".
    * Bottom is where to enter new chat (post). Which allow to select the author character from the character list, text content and attach image

* Right side bar: Room members with name and avatar. Avatar is "/data/avatar/{username}.png"
    * Hover on member will show "Delete" icon allow to kick the member out of room by send GET "/api/room/kick?room={room_id}&member={character_id}".


API call:
* GET "/api/room?member={character_id}": Get room list is json {rooms: Vec<{id,name}>, err: str}
* GET "/api/post?room={chat_id}": Get post list of a specific room.
  {posts: Vec<{id, content,author,created_at, room,liked: count, haha: count, loved: count, surprised: count, sad: count}>, err: str}
* GET "/api/media?post=${id}": Get the media of specific post. {media: Vec<{id, url, file_type: int (1: image, 2: video, 3:audio)}>, err: str}
* GET "/api/character": Get list of character. {characters: Vec<{id, username, name}>

Post form for message: feeling, is_with, group is not consider in this case. Let them empty or zero.
#[derive(MultipartForm, Debug)]
struct PostForm {
    id: Text<i64>,
    content: Text<String>,
    media: Vec<TempFile>,
    author: Text<i64>,
    parent: Text<i64>,
    liked: Text<i32>,
    haha: Text<i32>,
    loved: Text<i32>,
    surprised: Text<i32>,
    sad: Text<i32>,
    feeling: Text<String>,
    is_with: Text<String>,
    group: Text<i64>,
    room: Text<i64>,
}
-->

<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <!-- Reuse exact same head from index.html -->
    {% include "include/head.html" %}

    <title>Messenger - Social Novel</title>
    <style>
        /* Messenger-specific styles that match FB Messenger design */
        .messenger-container {
            height: 100vh;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
        }

        .messenger-main {
            flex: 1;
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        .chat-sidebar {
            width: 360px;
            background: white;
            border-right: 1px solid #e4e6ea;
            display: flex;
            flex-direction: column;
        }

        .chat-sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e4e6ea;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .new-chat-btn {
            flex: 1;
            background: #42b883;
            color: white;
            border: none;
            height: 40px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #36a26f;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0f2f5;
            transition: all 0.2s;
            position: relative;
        }

        .chat-item:hover, .chat-item.active {
            background: #f0f2f5;
        }

        .chat-item img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: #1c1e21;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-preview {
            color: #65676b;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-time {
            font-size: 12px;
            color: #65676b;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5e5e5;
        }

        .main-char-selector {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #e4e6ea;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #e5e5e5;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: messageSlideIn 0.3s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.right {
            flex-direction: row-reverse;
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.right .message-bubble {
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.left .message-bubble {
            background: white;
            color: #1c1e21;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.07);
        }

        .message-author {
            font-size: 12px;
            color: #667781;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .message.right .message-author {
            display: none;
        }

        .message img {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .message-input-area {
            background: white;
            padding: 12px 20px;
            border-top: 1px solid #c1d2e3;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .input-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .author-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-selector label {
            font-size: 13px;
            color: #65676b;
            font-weight: 500;
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #c1d2e3;
            border-radius: 22px;
            font-size: 15px;
            resize: none;
            min-height: 44px;
            max-height: 100px;
            outline: none;
            line-height: 20px;
        }

        .message-input:focus {
            border-color: #0084ff;
            box-shadow: 0 0 0 2px rgba(0,132,255,0.2);
        }

        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: #f0f2f5;
            color: #65676b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #e4e6ea;
        }

        .send-btn {
            background: #0084ff;
            color: white;
            width: 44px;
            height: 44px;
        }

        .send-btn:hover:not(:disabled) {
            background: #0066cc;
        }

        .send-btn:disabled {
            background: #b0b3b8;
            cursor: not-allowed;
        }

        .members-panel {
            width: 320px;
            background: white;
            border-left: 1px solid #e4e6ea;
            display: flex;
            flex-direction: column;
        }

        .members-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e4e6ea;
            font-weight: 600;
            color: #1c1e21;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #f7f7f7;
            cursor: pointer;
            transition: background 0.2s;
        }

        .member-item:hover {
            background: #f0f2f5;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
        }

        .member-name {
            font-weight: 500;
            color: #1c1e21;
        }

        .no-chat-selected {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8f95a0;
            font-size: 18px;
            text-align: center;
        }

        @media (max-width: 1400px) {
            .members-panel {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
                position: absolute;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .chat-sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- Reuse exact same header from index.html with Messenger active styling -->
    {% include "include/header.html" %}

    <div class="messenger-container">
        <div class="messenger-main">
            <!-- Left Sidebar -->
            <div class="chat-sidebar" id="chatSidebar">
                <div class="chat-sidebar-header">
                    <button class="new-chat-btn" onclick="createNewRoom()">
                        ➕ New Message
                    </button>
                </div>
                <div class="chat-list" id="chatList">
                    <div class="p-8 text-center text-fb-gray-text">
                        Loading chats...
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="main-chat">
                <div class="main-char-selector">
                    <label class="font-medium text-fb-gray-text">Main Character:</label>
                    <select id="mainCharacterSelect" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
                        <option value="">Select main character...</option>
                    </select>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="no-chat-selected">
                        <div>
                            <div class="text-3xl mb-4">💬</div>
                            <div>Start a conversation</div>
                            <div class="text-fb-gray-text text-sm mt-1">Pick a chat or start a new one</div>
                        </div>
                    </div>
                </div>

                <div class="message-input-area">
                    <div class="input-controls">
                        <div class="author-selector">
                            <label>From:</label>
                            <select id="messageAuthorSelect" class="border border-gray-200 rounded-lg px-3 py-1 text-sm">
                                <option value="">Choose character...</option>
                            </select>
                        </div>
                        <textarea 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Aa"
                            disabled
                            rows="1"
                        ></textarea>
                    </div>
                    <div class="input-actions">
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <button class="action-btn" onclick="document.getElementById('imageInput').click()" title="Photo/video">
                            📎
                        </button>
                        <button class="action-btn send-btn" id="sendButton" onclick="sendMessage()" disabled>
                            ➤
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Members Panel -->
            <div class="members-panel">
                <div class="members-header">Members</div>
                <div class="members-list" id="membersList">
                    <div class="p-8 text-center text-fb-gray-text">
                        Select a chat to see members
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        // Messenger-specific variables
        let rooms = [];
        let currentRoomId = null;
        let currentPosts = [];
        let characters = [];
        let mainCharacterId = null;
        let selectedImageFile = null;

        // Initialize messenger
        async function initMessenger() {
            try {
                await Promise.allSettled([
                    fetchRooms(),
                    fetchCharacters()
                ]);
                setupMessengerEvents();
            } catch (error) {
                console.error('Messenger init failed:', error);
            }
        }

        // Fetch rooms (reuse fetch pattern from utils.js)
        async function fetchRooms() {
            const res = await fetch('/api/room');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            rooms = await res.json();
            renderChatList();
        }

        // Fetch characters
        async function fetchCharacters() {
            const res = await fetch('/api/character');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            characters = await res.json();
            renderCharacterSelectors();
        }

        // Render chat list using escapeHtml from utils.js
        function renderChatList() {
            const container = document.getElementById('chatList');
            if (!rooms.length) {
                container.innerHTML = '<div class="p-8 text-center text-fb-gray-text">No chats yet</div>';
                return;
            }

            container.innerHTML = rooms.map(room => {
                const roomImg = `/data/room/${room.id}.png`;
                return `
                    <div class="chat-item ${currentRoomId === room.id ? 'active' : ''}" data-room-id="${room.id}" onclick="selectRoom('${room.id}')">
                        <img src="${roomImg}" alt="${escapeHtml(room.name)}" 
                             onerror="this.src='/data/room/default.png'">
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(room.name)}</div>
                            <div class="chat-preview">${room.members?.length || 0} members</div>
                        </div>
                        <div class="chat-time">${timeAgo(room.updated_at || room.created_at)}</div>
                    </div>
                `;
            }).join('');
        }

        // Render character selectors
        function renderCharacterSelectors() {
            const mainSelect = document.getElementById('mainCharacterSelect');
            const authorSelect = document.getElementById('messageAuthorSelect');
            
            const options = characters.map(c => 
                `<option value="${c.id}">${escapeHtml(c.name)}</option>`
            ).join('');
            
            mainSelect.innerHTML = '<option value="">Select main character...</option>' + options;
            authorSelect.innerHTML = '<option value="">Choose character...</option>' + options;
        }

        // Select room
        async function selectRoom(roomId) {
            currentRoomId = roomId;
            
            // Update active state
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // Load messages
            await loadRoomMessages(roomId);
            
            // Update members
            renderMembersPanel();
            
            // Enable input
            toggleMessageInput(true);
        }

        // Load room messages (posts)
        async function loadRoomMessages(roomId) {
            try {
                const res = await fetch(`/api/post?room=${roomId}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                currentPosts = await res.json();
                renderMessages();
            } catch (error) {
                console.error('Failed to load messages:', error);
                document.getElementById('chatMessages').innerHTML = 
                    '<div class="no-chat-selected">Failed to load messages</div>';
            }
        }

        // Render messages with main character logic
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            const mainCharId = document.getElementById('mainCharacterSelect').value;
            
            if (!currentPosts.length) {
                container.innerHTML = '<div class="no-chat-selected">No messages yet. Be the first to chat!</div>';
                return;
            }
            
            container.innerHTML = currentPosts.map(post => {
                const isMainChar = String(post.character_id) === String(mainCharId);
                const character = characters.find(c => c.id == post.character_id);
                const charName = character ? character.name : 'Unknown';
                
                const directionClass = isMainChar ? 'right' : 'left';
                const bubbleClass = isMainChar ? 'bg-[#0084ff] text-white' : 'bg-white shadow-sm';
                
                let html = `
                    <div class="message ${directionClass}">
                        <div class="message-bubble ${bubbleClass} px-4 py-3 rounded-2xl max-w-[70%]">
                `;
                
                if (!isMainChar) {
                    html += `<div class="message-author mb-2">${escapeHtml(charName)}</div>`;
                }
                
                html += `<div>${renderContentWithMentions(post.content)}</div>`;
                
                if (post.image) {
                    html += `<img src="${post.image}" class="mt-2 rounded-lg max-w-full">`;
                }
                
                html += `
                        </div>
                    </div>
                `;
                return html;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // Render members panel
        function renderMembersPanel() {
            const room = rooms.find(r => r.id === currentRoomId);
            const container = document.getElementById('membersList');
            
            if (!room?.members?.length) {
                container.innerHTML = '<div class="p-8 text-center text-fb-gray-text">No members</div>';
                return;
            }
            
            container.innerHTML = room.members.map(member => {
                const char = characters.find(c => c.id == member.character_id);
                const name = char ? char.name : member.username || 'Unknown';
                const avatar = getAvatarUrl({username: member.username}) || `/data/avatar/default.png`;
                
                return `
                    <div class="member-item">
                        <img class="member-avatar" src="${avatar}" alt="${escapeHtml(name)}" 
                             onerror="this.src='/data/avatar/default.png'">
                        <div class="member-name">${escapeHtml(name)}</div>
                    </div>
                `;
            }).join('');
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const authorId = document.getElementById('messageAuthorSelect').value;
            const content = input.value.trim();
            
            if (!content || !currentRoomId || !authorId) return;
            
            const formData = {
                room_id: currentRoomId,
                character_id: authorId,
                content: content
            };

            try {
                const res = await fetch('/api/post', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                if (res.ok) {
                    input.value = '';
                    resizeInput();
                    selectedImageFile = null;
                    document.getElementById('imageInput').value = '';
                    await loadRoomMessages(currentRoomId);
                }
            } catch (error) {
                console.error('Send failed:', error);
            }
        }

        // Toggle message input enabled/disabled
        function toggleMessageInput(enabled) {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendButton');
            input.disabled = !enabled;
            sendBtn.disabled = !enabled;
        }

        // Setup event listeners
        function setupMessengerEvents() {
            // Main character change
            document.getElementById('mainCharacterSelect').addEventListener('change', (e) => {
                mainCharacterId = e.target.value;
                if (currentPosts.length) renderMessages();
            });

            // Message input
            const input = document.getElementById('messageInput');
            input.addEventListener('input', function() {
                resizeInput();
                const hasContent = this.value.trim();
                const hasAuthor = document.getElementById('messageAuthorSelect').value;
                document.getElementById('sendButton').disabled = !(hasContent && hasAuthor && currentRoomId);
            });

            // Enter to send
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Image upload (basic handling - real app would upload)
            document.getElementById('imageInput').addEventListener('change', function(e) {
                selectedImageFile = e.target.files[0];
                if (selectedImageFile) {
                    console.log('Image selected:', selectedImageFile.name);
                    // In real app: upload file and get URL
                }
            });

            // Auto-resize textarea
            function resizeInput() {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 100) + 'px';
            }
        }

        // Create new room (placeholder)
        function createNewRoom() {
            const name = prompt('Room name:');
            if (name) {
                // POST /api/room/{name}
                alert(`Creating "${name}" (TODO: implement)`);
            }
        }

        // Mobile sidebar toggle (if needed)
        function toggleSidebar() {
            document.getElementById('chatSidebar').classList.toggle('open');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initMessenger);
    </script>
</body>
</html>
