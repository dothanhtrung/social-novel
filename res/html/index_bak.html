{% include "include/header.html" %}
{% include "include/dashboard.html" %}
<!-- Feed container - Facebook-like width & spacing -->
<div class="max-w-[680px] mx-auto mt-4 px-2 sm:px-0 space-y-5 pb-12">

    <!-- === ADMIN CREATE POST CARD === -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

        <!-- Card header -->
        <div class="px-4 pt-4 pb-2 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl">
                A
            </div>
            <div class="flex-1">
                <div class="font-medium text-gray-900">Admin • Create Post as User</div>
                <div class="text-xs text-gray-500 mt-0.5">For testing / moderation / seeding content</div>
            </div>
        </div>

        <!-- === THE FORM === -->
        <form action="/api/post" method="POST" enctype="multipart/form-data" class="px-4 pb-5 space-y-5">

            <!-- Hidden fields -->
            <input type="hidden" name="id" value="0">
            <input type="hidden" name="parent" value="0">

            <!-- === Searchable Author Dropdown === -->
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">
                    Post as user <span class="text-red-500">*</span>
                </label>

                <!-- Hidden input that holds the actual user ID (what gets sent to backend) -->
                <input
                        type="hidden"
                        name="author"
                        id="selected-author-id"
                        required
                />

                <!-- Visible search input -->
                <input
                        type="text"
                        id="author-search"
                        placeholder="Search by name or username..."
                        autocomplete="off"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white"
                        required
                />

                <!-- Dropdown results container -->
                <div
                        id="author-dropdown"
                        class="hidden absolute z-20 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl max-h-72 overflow-y-auto divide-y divide-gray-100"
                ></div>
            </div>

            <!-- Feeling + With -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Feeling</label>
                    <input
                            type="text"
                            name="feeling"
                            placeholder="feeling excited, blessed, tired..."
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">With</label>
                    <input
                            type="text"
                            name="is_with"
                            placeholder="friends, family, Hanoi, Vietnam..."
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    />
                </div>
            </div>

            <!-- Main content textarea -->
            <textarea
                    name="content"
                    rows="5"
                    placeholder="What's on your mind?"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-gray-800 text-base"
            ></textarea>

            <!-- Photo upload -->
            <label class="block cursor-pointer">
                <input
                        type="file"
                        name="media"
                        accept="image/*"
                        class="hidden"
                        multiple
                />
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-blue-500 transition-colors bg-gray-50">
                    <div class="text-blue-500 mb-3">
                        <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <p class="text-gray-700 font-medium">Add Photos / Video</p>
                    <p class="text-sm text-gray-500 mt-1">or drag & drop (PNG, JPG, max 10MB)</p>
                </div>
            </label>

            <!-- Image preview area -->
            <div id="image-preview" class="hidden grid grid-cols-2 sm:grid-cols-3 gap-3 mt-3"></div>

            <!-- Pre-set reaction counts (admin only) -->
            <div class="grid grid-cols-5 gap-3">
                <div>
                    <label class="block text-xs text-gray-600 mb-1 text-center">Like</label>
                    <input type="number" name="liked" min="0" value="0" class="w-full px-2 py-1.5 text-center border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1 text-center">Haha</label>
                    <input type="number" name="haha" min="0" value="0" class="w-full px-2 py-1.5 text-center border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1 text-center">Love</label>
                    <input type="number" name="loved" min="0" value="0" class="w-full px-2 py-1.5 text-center border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1 text-center">Wow</label>
                    <input type="number" name="surprised" min="0" value="0" class="w-full px-2 py-1.5 text-center border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-xs text-gray-600 mb-1 text-center">Sad</label>
                    <input type="number" name="sad" min="0" value="0" class="w-full px-2 py-1.5 text-center border border-gray-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 outline-none" />
                </div>
            </div>

            <!-- Submit buttons -->
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <button type="button" class="px-6 py-2.5 text-gray-700 hover:bg-gray-100 rounded-lg transition">
                    Cancel
                </button>
                <button type="submit" class="px-8 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition shadow-sm">
                    Post
                </button>
            </div>

        </form>
    </div>

    <!-- Future posts will appear here -->
    <div id="feed-posts" class="space-y-5">
        <!-- Posts go here -->
    </div>

</div>

<!-- ============================================= -->
<!--               JAVASCRIPT SECTION              -->
<!-- ============================================= -->
<script>
    // Author Search + Dropdown Logic
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('author-search');
        const dropdown = document.getElementById('author-dropdown');
        const hiddenInput = document.getElementById('selected-author-id');
        const previewContainer = document.getElementById('image-preview');
        let users = [];

        // Fetch users from /api/character
        fetch('/api/character')
            .then(res => res.json())
            .then(data => {
                if (data.err) {
                    console.error('Error fetching characters:', data.err);
                    dropdown.innerHTML = '<div class="px-4 py-3 text-red-600">Error loading users</div>';
                    dropdown.classList.remove('hidden');
                    return;
                }
                users = data.characters || [];
            })
            .catch(err => {
                console.error('Fetch error:', err);
                dropdown.innerHTML = '<div class="px-4 py-3 text-red-600">Failed to load users</div>';
                dropdown.classList.remove('hidden');
            });

        // Show all users when focusing input
        searchInput.addEventListener('focus', () => {
            if (users.length > 0) renderDropdown(users);
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', e => {
            if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

        // Live search
        searchInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();
            if (!query) {
                renderDropdown(users);
                return;
            }

            const matches = users.filter(user =>
                (user.name?.toLowerCase().includes(query) ||
                    user.username?.toLowerCase().includes(query))
            );

            renderDropdown(matches);
        });

        function renderDropdown(filtered) {
            dropdown.innerHTML = '';

            if (filtered.length === 0) {
                dropdown.innerHTML = '<div class="px-4 py-3 text-gray-500">No users found</div>';
                dropdown.classList.remove('hidden');
                return;
            }

            filtered.forEach(user => {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 hover:bg-blue-50 cursor-pointer flex items-center gap-3 transition-colors border-b last:border-b-0';
                item.innerHTML = `
        <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 font-semibold">
          ${user.name?.charAt(0)?.toUpperCase() || '?'}
        </div>
        <div>
          <div class="font-medium text-gray-900">${user.name || 'Unknown'}</div>
          <div class="text-sm text-gray-500">@${user.username || '—'}</div>
        </div>
      `;

                item.addEventListener('click', () => {
                    searchInput.value = `${user.name} (@${user.username})`;
                    hiddenInput.value = user.id;
                    dropdown.classList.add('hidden');
                });

                dropdown.appendChild(item);
            });

            dropdown.classList.remove('hidden');
        }

        // === Image Preview ===
        document.querySelector('input[type="file"][name="media"]')
            ?.addEventListener('change', function(e) {
                previewContainer.innerHTML = '';
                previewContainer.classList.remove('hidden');

                Array.from(this.files).forEach(file => {
                    if (!file.type.startsWith('image/')) return;

                    const reader = new FileReader();
                    reader.onload = ev => {
                        const div = document.createElement('div');
                        div.className = 'relative rounded-lg overflow-hidden aspect-square shadow-sm';
                        div.innerHTML = `
            <img src="${ev.target.result}" class="w-full h-full object-cover" />
          `;
                        previewContainer.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            });
    });
</script>

<!-- dashboard close tags -->
</div>
</main>


</body>
</html>
