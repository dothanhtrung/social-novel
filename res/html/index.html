{% include "include/dashboard.html" %}


<div id="post-list" class="space-y-4 max-w-3xl mx-auto"></div>

<script>
    const postList = document.getElementById("post-list");
    let characters = {};

    // Get query string
    const params = new URLSearchParams(window.location.search);
    const queryStr = params.toString();

    // Emoji map
    const emojiMap = {
        liked: "👍",
        haha: "😂",
        loved: "❤️",
        surprised: "😮",
        sad: "😢"
    };

    async function fetchCharacters() {
        const res = await fetch("/api/character");
        const json = await res.json();
        for (const c of json.characters) {
            characters[c.id] = { name: c.name, username: c.username };
        }
    }

    async function fetchMedia(postId) {
        const res = await fetch(`/api/media?post=${postId}`);
        return res.ok ? await res.json() : { media: [] };
    }

    async function fetchComments(postId) {
        const res = await fetch(`/api/post?parent=${postId}`);
        return res.ok ? (await res.json()).posts || [] : [];
    }

    function createReactionBlock(post) {
        return Object.entries(emojiMap).map(([key, emoji]) => {
            if (post[key] > 0) {
                return `<span class="mr-2">${emoji} ${post[key] || 0}</span>`;
            }
        }).join('');
    }

    function getRelativeTimeString(timestamp) {
        const now = new Date();
        const postTime = new Date(timestamp * 1000); // Convert Unix timestamp to milliseconds
        const diffInSeconds = Math.floor((now - postTime) / 1000);

        // Less than a minute
        if (diffInSeconds < 60) {
            return diffInSeconds <= 10 ? 'few seconds ago' : `${diffInSeconds} seconds ago`;
        }

        const diffInMinutes = Math.floor(diffInSeconds / 60);

        // Less than an hour
        if (diffInMinutes < 60) {
            if (diffInMinutes === 1) {
                return '1 minute ago';
            } else if (diffInMinutes <= 3) {
                return 'few minutes ago';
            } else {
                return `${diffInMinutes} minutes ago`;
            }
        }

        const diffInHours = Math.floor(diffInMinutes / 60);

        // Less than 24 hours
        if (diffInHours < 24) {
            return diffInHours === 1 ? '1 hour ago' : `${diffInHours} hours ago`;
        }

        const diffInDays = Math.floor(diffInHours / 24);

        // Less than 7 days
        if (diffInDays < 7) {
            return diffInDays === 1 ? '1 day ago' : `${diffInDays} days ago`;
        }

        // More than a week - show actual date and time
        const options = {
            day: 'numeric',
            month: 'short',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
        };

        return postTime.toLocaleDateString('en-US', options).replace(',', '') + ' ' +
            postTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function createPostBlock(post, mediaList, comments = []) {
        const author = characters[post.author] || { name: "Unknown", username: "unknown" };
        const avatarUrl = `/data/avatar/${author.username}.png`;

        const mediaHtml = mediaList.map(m =>
            `<img src="/data/${m.url}" class="max-w-full max-h-64 rounded mt-2" alt="media">`
        ).join('');

        const commentHtml = comments.map(c => {
            const ca = characters[c.author] || { name: "Unknown", username: "unknown" };
            const cav = `/data/avatar/${ca.username}.png`;
            return `
          <div class="flex space-x-2 mt-2 bg-gray-50 p-2 rounded">
            <img src="${cav}" class="w-6 h-6 rounded-full" />
            <div>
              <div class="text-sm font-semibold">${ca.name}</div>
              <div class="text-sm">${c.content}</div>
            </div>
          </div>
        `;
        }).join('');

        return `
        <div class="bg-white p-4 rounded shadow">
          <div class="flex items-center space-x-2 mb-2">
            <img src="${avatarUrl}" class="w-10 h-10 rounded-full" />
            <div>
              <div class="font-semibold">${author.name}</div>
              <div class="text-sm text-gray-500">${getRelativeTimeString(post.updated_at)}</div>
            </div>
          </div>
          <div class="mb-2">
            ${post.feeling ? `<div class="text-sm text-gray-600 italic">is feeling ${post.feeling}</div>` : ""}
            ${post.is_with ? `<div class="text-sm text-gray-600">with ${post.is_with}</div>` : ""}
          </div>
          <div class="mb-2 whitespace-pre-wrap">${post.content}</div>
          ${mediaHtml}
          <div class="mt-2 text-sm text-gray-600">${createReactionBlock(post)}</div>
          {% include "include/break.html" %}
          ${comments.length > 0 ? `<div class="mt-2">${commentHtml}</div>` : ""}
          {% include "include/comment.html" %}
        </div>
      `;
    }

    async function loadPosts() {
        await fetchCharacters();
        const res = await fetch(`/api/post?${queryStr}`);
        const json = await res.json();
        const posts = json.posts || [];

        for (const post of posts) {
            const [mediaData, comments] = await Promise.all([
                fetchMedia(post.id),
                fetchComments(post.id)
            ]);
            const html = createPostBlock(post, mediaData.media || [], comments);
            postList.insertAdjacentHTML("beforeend", html);
        }
    }

    loadPosts();
</script>
