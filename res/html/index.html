<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>News Feed with Expanded Comments</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
    let userMap = {};
    let userList = [];
    async function fetchUsers() {
        try {
            const res = await fetch("/api/character");
            const data = await res.json();
            if (data.characters) {
                userMap = {};
                userList = data.characters;
                for (const user of data.characters) {
                    userMap[user.id] = user;
                }
            }
        } catch (e) {
            userMap = {};
            userList = [];
        }
    }

    function getAvatarUrl(user) {
        if (user && user.username) {
            return `/data/avatar/${user.username}.png`;
        }
        // if (user && user.username) {
        //     return "https://ui-avatars.com/api/?name=" + encodeURIComponent(user.name || user.username);
        // }
        return "https://ui-avatars.com/api/?name=Unknown";
    }

    // Robust parser for backend timestamp strings like:
    // "2026-01-16 8:40:12.33977 +00:00:00"
    function parseTimestamp(s) {
        if (!s) return new Date();
        let str = String(s).trim();
        // Replace first space between date and time with 'T'
        str = str.replace(/^([0-9]{4}-[0-9]{2}-[0-9]{2})\s+/, '$1T');
        // Remove any extra space before timezone
        str = str.replace(/\s+([+-]\d{2}:\d{2}:?\d{0,2})$/, '$1');
        // Convert timezone like +00:00:00 to +00:00 (drop seconds)
        str = str.replace(/([+-]\d{2}:\d{2}):\d{2}$/, '$1');
        // Ensure hour has two digits (e.g. T8: -> T08:)
        str = str.replace(/T(\d):/, 'T0$1:');
        // If there's no timezone or Z, assume UTC
        if (!/[Zz]|[+-]\d{2}:\d{2}$/.test(str)) {
            str = str + 'Z';
        }
        const d = new Date(str);
        if (isNaN(d.getTime())) {
            // Try fallback by removing fractional seconds
            const alt = String(s).replace(/(\.[0-9]+)\s+/, ' ');
            const d2 = new Date(alt);
            if (!isNaN(d2.getTime())) return d2;
            return new Date(s);
        }
        return d;
    }

    // Friendly relative time like Facebook: few seconds ago, 15 minutes ago, 1 day ago, or 'Jan 16 at 17:04'
    function timeAgo(s) {
        const d = parseTimestamp(s);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000); // seconds
        if (diff < 10) return 'few seconds ago';
        if (diff < 60) return `${diff} seconds ago`;
        if (diff < 3600) {
            const m = Math.floor(diff / 60);
            return `${m} minute${m !== 1 ? 's' : ''} ago`;
        }
        if (diff < 86400) {
            const h = Math.floor(diff / 3600);
            return `${h} hour${h !== 1 ? 's' : ''} ago`;
        }
        if (diff < 604800) { // less than 7 days
            const days = Math.floor(diff / 86400);
            return `${days} day${days !== 1 ? 's' : ''} ago`;
        }
        // older: if same year, show 'Jan 16 at 17:04', else full date
        const nowYear = now.getFullYear();
        if (d.getFullYear() === nowYear) {
            return d.toLocaleString(undefined, { month: 'short', day: 'numeric' }) + ' at ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        }
        return d.toLocaleString();
    }

    function renderReactions(p) {
        const parts = [];
        if (p.liked && p.liked > 0) {
            parts.push(`<div class='flex items-center gap-1'><div class='size-[18px] rounded-full bg-[#1877F2] flex items-center justify-center text-white text-[11px]'>👍</div><span class='text-[14px] text-fb-gray-text'>${p.liked}</span></div>`);
        }
        if (p.loved && p.loved > 0) {
            parts.push(`<div class='flex items-center gap-1'><div class='size-[18px] rounded-full bg-[#F3425E] flex items-center justify-center text-white text-[11px]'>❤️</div><span class='text-[14px] text-fb-gray-text'>${p.loved}</span></div>`);
        }
        if (p.haha && p.haha > 0) {
            parts.push(`<div class='flex items-center gap-1'><div class='size-[18px] rounded-full bg-[#F7B500] flex items-center justify-center text-white text-[11px]'>😂</div><span class='text-[14px] text-fb-gray-text'>${p.haha}</span></div>`);
        }
        if (p.surprised && p.surprised > 0) {
            parts.push(`<div class='flex items-center gap-1'><div class='size-[18px] rounded-full bg-[#9B8CFF] flex items-center justify-center text-white text-[11px]'>😮</div><span class='text-[14px] text-fb-gray-text'>${p.surprised}</span></div>`);
        }
        if (p.sad && p.sad > 0) {
            parts.push(`<div class='flex items-center gap-1'><div class='size-[18px] rounded-full bg-[#6E6E6E] flex items-center justify-center text-white text-[11px]'>😢</div><span class='text-[14px] text-fb-gray-text'>${p.sad}</span></div>`);
        }
        if (parts.length === 0) return `<span class='text-[14px] text-fb-gray-text'>0 reactions</span>`;
        return parts.join('<div class="w-3"></div>');
    }

    async function renderContacts() {
        const contactsContainer = document.querySelector("[data-contacts-list]");
        if (!contactsContainer) return;
        try {
            const res = await fetch("/api/character");
            const data = await res.json();
            if (data.characters) {
                contactsContainer.innerHTML = data.characters.map(user => `
                <a class='flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-fb-hover transition-colors' href='#'>
                    <div class='relative size-9'>
                        <div class='w-full h-full rounded-full bg-cover bg-center' style='background-image: url("${getAvatarUrl(user)}");'></div>
                        <div class='active-dot'></div>
                    </div>
                    <span class='text-[15px] font-semibold'>${user.name || user.username}</span>
                </a>
            `).join("");
            }
        } catch (e) {
            contactsContainer.innerHTML = '<div class="text-red-500">Failed to load contacts</div>';
        }
    }

    async function renderPosts() {
        const postsContainer = document.querySelector("[data-posts-list]");
        if (!postsContainer) return;
        try {
            const res = await fetch("/api/post");
            const data = await res.json();
            if (data.posts) {
                // Group posts by id and attach children as comments
                const posts = data.posts;
                const byId = {};
                for (const p of posts) {
                    byId[p.id] = { ...p, comments: [] };
                }
                const roots = [];
                for (const id in byId) {
                    const p = byId[id];
                    if (p.parent && p.parent > 0 && byId[p.parent]) {
                        byId[p.parent].comments.push(p);
                    } else {
                        roots.push(p);
                    }
                }

                function renderComment(c) {
                    const a = userMap[c.author] || { username: 'unknown', name: 'Unknown' };
                    return `
                    <div class="pl-12 pr-4 py-3 border-t border-gray-100 bg-white relative">
                        <div class="flex items-start gap-3">
                            <div class="size-8 rounded-full bg-cover bg-center" style="background-image: url('${getAvatarUrl(a)}')"></div>
                            <div class="flex-1">
                                <div class="text-[14px] text-[#050505]"><strong>${a.name || a.username}</strong></div>
                                        <div class="text-[14px] text-fb-gray-text">${c.content || ''}</div>
                                        <div class="mt-2">${renderReactions(c)}</div>
                                        <p class='text-[12px] text-fb-gray-text mt-1' title='${new Date(c.updated_at || c.created_at).toLocaleString()}'>${timeAgo(c.updated_at || c.created_at)}</p>
                            </div>
                            <div class='relative ml-2'>
                                <button class='options-btn p-1 rounded-full hover:bg-fb-hover' data-post-id='${c.id}' aria-label='Comment Options'>
                                    <span class='material-symbols-outlined' style='font-size:16px'>more_horiz</span>
                                </button>
                                <div class='options-menu hidden absolute w-28 bg-white rounded shadow-md z-50' style='right:12px; top:8px;'>
                                    <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-edit' data-post-id='${c.id}'>Edit</button>
                                    <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-delete' data-post-id='${c.id}'>Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                function renderPost(p) {
                    const a = userMap[p.author] || { username: 'unknown', name: 'Unknown' };
                    const mediaHtml = (p.media && p.media.length > 0) ? `<div class='w-full bg-cover bg-center aspect-video' style='background-image: url("${p.media[0].url}");'></div>` : '';
                    const commentsHtml = (p.comments && p.comments.length > 0) ? p.comments.map(renderComment).join('') : '';
                    return `
                    <div class='bg-white rounded-lg shadow-sm border border-gray-200 mb-4'>
                        <div class='px-4 py-3'>
                            <div class='flex items-center justify-between'>
                                <div class='flex items-center gap-2'>
                                    <div class='size-10 rounded-full bg-cover bg-center' style='background-image: url("${getAvatarUrl(a)}");'></div>
                                    <div>
                                        <h4 class='text-[15px] font-bold hover:underline cursor-pointer text-[#050505]'>${a.name || a.username}</h4>
                                        <p class='text-[13px] text-fb-gray-text flex items-center gap-1'>
                                            ${timeAgo(p.updated_at || p.created_at)} <span class="text-[10px] text-fb-gray-text">•</span> <span class='material-symbols-outlined !text-[14px]'>public</span>
                                        </p>
                                    </div>
                                </div>
                                <div class='relative ml-2'>
                                    <button class='options-btn p-1 rounded-full hover:bg-fb-hover' data-post-id='${p.id}' aria-label='Options'>
                                        <span class='material-symbols-outlined' style='font-size:18px'>more_horiz</span>
                                    </button>
                                    <div class='options-menu hidden absolute w-36 bg-white rounded shadow-md z-50' style='right:12px; top:36px;'>
                                        <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-edit' data-post-id='${p.id}'>Edit</button>
                                        <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-delete' data-post-id='${p.id}'>Delete</button>
                                    </div>
                                </div>
                            </div>
                            <p class='text-[15px] mt-2 mb-3'>${p.content || ""}</p>
                        </div>
                        ${mediaHtml}
                        <div class='px-4 py-2.5 flex items-center justify-between'>
                            <div class='flex items-center gap-2'>
                                ${renderReactions(p)}
                            </div>
                            <div class='flex gap-3'>
                                <span class='text-[15px] text-fb-gray-text hover:underline cursor-pointer'>${(p.comments && p.comments.length) ? p.comments.length + ' comments' : '0 comments'}</span>
                            </div>
                        </div>
                        <div class='mx-4 border-y border-gray-100 flex items-center gap-1 py-1'>
                            <button class='flex-1 flex items-center justify-center gap-2 py-1.5 hover:bg-fb-hover rounded-lg transition-colors text-fb-gray-text'>
                                <span class='material-symbols-outlined !text-[20px]'>thumb_up</span>
                                <span class='text-[15px] font-semibold'>Like</span>
                            </button>
                            <button class='flex-1 flex items-center justify-center gap-2 py-1.5 hover:bg-fb-hover rounded-lg transition-colors text-[#1877F2]'>
                                <span class='material-symbols-outlined !text-[20px] !fill-1'>chat_bubble</span>
                                <span class='text-[15px] font-semibold'>Comment</span>
                            </button>
                            <button class='flex-1 flex items-center justify-center gap-2 py-1.5 hover:bg-fb-hover rounded-lg transition-colors text-fb-gray-text'>
                                <span class='material-symbols-outlined !text-[20px]'>share</span>
                                <span class='text-[15px] font-semibold'>Share</span>
                            </button>
                        </div>
                        ${commentsHtml}
                        <div class="px-4 py-3 border-t border-gray-100 bg-white">
                            <form class="comment-form flex items-start gap-3" data-parent-id="${p.id}" enctype="multipart/form-data">
                                <select name="author" class="w-28 px-2 py-1 border rounded">${userList.map(u => `<option value="${u.id}">${u.name||u.username}</option>`).join('')}</select>
                                <textarea name="content" placeholder="Write a comment..." class="flex-1 px-3 py-2 border rounded resize-none" rows="2"></textarea>
                                <input type="file" name="media" accept="image/*,video/*" class="hidden comment-media-input" />
                                <button type="button" class="comment-add-media px-2">📷</button>
                                <div class="flex items-center gap-1">
                                    <label class="text-sm">👍</label>
                                    <input name="liked" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                    <label class="text-sm">😂</label>
                                    <input name="haha" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                    <label class="text-sm">❤️</label>
                                    <input name="loved" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                    <label class="text-sm">😮</label>
                                    <input name="surprised" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                    <label class="text-sm">😢</label>
                                    <input name="sad" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                </div>
                                <button type="submit" class="ml-2 bg-[#1877F2] text-white px-3 py-1 rounded">Comment</button>
                            </form>
                        </div>
                    </div>`;
                }

                postsContainer.innerHTML = roots.map(renderPost).join('');
            }
        } catch (e) {
            postsContainer.innerHTML = '<div class="text-red-500">Failed to load posts</div>';
        }
    }

    function renderAuthorSelect() {
        const select = document.getElementById('author-select');
        if (!select) return;
        select.innerHTML = userList.map(user => `<option value="${user.id}">${user.name || user.username}</option>`).join("");
        // Set avatar for first user
        if (userList.length > 0) {
            setAuthorAvatar(userList[0]);
        }
    }

    function setAuthorAvatar(user) {
        const avatarDiv = document.getElementById('author-avatar');
        if (avatarDiv) {
            avatarDiv.style.backgroundImage = `url('${getAvatarUrl(user)}')`;
        }
    }

    function handleAuthorChange() {
        const select = document.getElementById('author-select');
        select.addEventListener('change', function() {
            const user = userMap[select.value];
            setAuthorAvatar(user);
        });
        // Optionally, make the select searchable (simple filter)
        select.addEventListener('input', function() {
            const val = select.value.toLowerCase();
            for (let i = 0; i < select.options.length; i++) {
                const option = select.options[i];
                const user = userMap[option.value];
                option.style.display = (user.name && user.name.toLowerCase().includes(val)) || (user.username && user.username.toLowerCase().includes(val)) ? '' : 'none';
            }
        });
    }

    function handlePhotoVideo() {
        const btn = document.getElementById('photo-video-btn');
        const input = document.getElementById('media-input');
        btn.addEventListener('click', () => input.click());
        input.addEventListener('change', function() {
            const preview = document.getElementById('media-preview');
            preview.innerHTML = '';
            for (const file of input.files) {
                const url = URL.createObjectURL(file);
                let el;
                if (file.type.startsWith('image/')) {
                    el = document.createElement('img');
                    el.src = url;
                    el.className = 'w-20 h-20 object-cover rounded-lg';
                } else if (file.type.startsWith('video/')) {
                    el = document.createElement('video');
                    el.src = url;
                    el.className = 'w-20 h-20 object-cover rounded-lg';
                    el.controls = true;
                }
                if (el) preview.appendChild(el);
            }
        });
    }

    function handleFeeling() {
        const btn = document.getElementById('feeling-btn');
        const input = document.getElementById('feeling-input');
        btn.addEventListener('click', () => {
            input.classList.toggle('hidden');
            if (!input.classList.contains('hidden')) input.focus();
        });
    }

    function handleAddFeedForm() {
        const form = document.getElementById('add-feed-form');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            // Add default values for required fields if missing
            if (!formData.get('author')) {
                formData.set('author', userList[0]?.id || '');
            }
            if (!formData.get('content')) {
                alert('Content cannot be empty.');
                return;
            }
            // Attach all selected media files
            const mediaInput = document.getElementById('media-input');
            for (const file of mediaInput.files) {
                formData.append('media', file);
            }
            // Add default values for other fields required by backend
            formData.set('id', '0');
            formData.set('parent', '0');
            formData.set('liked', '0');
            formData.set('haha', '0');
            formData.set('loved', '0');
            formData.set('surprised', '0');
            formData.set('sad', '0');
            const isWithVal = document.getElementById('is-with-input') ? document.getElementById('is-with-input').value : '';
            formData.set('is_with', isWithVal);
            try {
                const res = await fetch('/api/post', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.err) {
                    alert('Failed to post: ' + data.err);
                } else {
                    form.reset();
                    document.getElementById('media-preview').innerHTML = '';
                    document.getElementById('feeling-input').classList.add('hidden');
                    renderPosts();
                }
            } catch (err) {
                alert('Failed to post: ' + err);
            }
        });
    }

    function initPostOptions() {
        // Delegate click to toggle options menu
        document.addEventListener('click', function(e) {
            // Toggle menus when clicking options button
            if (e.target.closest && e.target.closest('.options-btn')) {
                e.preventDefault();
                const btn = e.target.closest('.options-btn');
                const menu = btn.parentElement.querySelector('.options-menu');
                if (menu) menu.classList.toggle('hidden');
                return;
            }

            
            // Click on edit
            if (e.target.closest && e.target.closest('.options-edit')) {
                e.preventDefault();
                const id = e.target.closest('.options-edit').dataset.postId;
                editPost(id);
                return;
            }
            // Click on delete
            if (e.target.closest && e.target.closest('.options-delete')) {
                e.preventDefault();
                const id = e.target.closest('.options-delete').dataset.postId;
                deletePost(id);
                return;
            }
            // Click outside: close any open menus
            if (!e.target.closest || !e.target.closest('.options-menu')) {
                document.querySelectorAll('.options-menu').forEach(m => m.classList.add('hidden'));
            }
        });
    }

    window.initCommentHandlers = function() {
        // Media button triggers file input for comment forms
        document.addEventListener('click', function(e) {
            const btn = e.target.closest && e.target.closest('.comment-add-media');
            if (btn) {
                e.preventDefault();
                const form = btn.closest('.comment-form');
                if (!form) return;
                const input = form.querySelector('.comment-media-input');
                if (input) input.click();
            }
        });

        // Submit comment forms (collect explicit reaction counters)
        document.addEventListener('submit', async function(e) {
            const form = e.target.closest && e.target.closest('.comment-form');
            if (!form) return;
            e.preventDefault();
            const parentId = form.dataset.parentId || '0';
            const fd = new FormData();
            const author = form.querySelector('select[name="author"]')?.value || '';
            const content = form.querySelector('textarea[name="content"]')?.value || '';
            // Read numeric reaction counters (admin-controlled)
            const likedVal = form.querySelector('input[name="liked"]')?.value || '0';
            const hahaVal = form.querySelector('input[name="haha"]')?.value || '0';
            const lovedVal = form.querySelector('input[name="loved"]')?.value || '0';
            const surprisedVal = form.querySelector('input[name="surprised"]')?.value || '0';
            const sadVal = form.querySelector('input[name="sad"]')?.value || '0';
            fd.set('author', author);
            fd.set('content', content);
            fd.set('parent', parentId);
            fd.set('id', '0');
            fd.set('liked', String(Number(likedVal) || 0));
            fd.set('haha', String(Number(hahaVal) || 0));
            fd.set('loved', String(Number(lovedVal) || 0));
            fd.set('surprised', String(Number(surprisedVal) || 0));
            fd.set('sad', String(Number(sadVal) || 0));
            const mediaInput = form.querySelector('.comment-media-input');
            if (mediaInput && mediaInput.files && mediaInput.files.length > 0) {
                for (const f of mediaInput.files) fd.append('media', f);
            }
            try {
                const res = await fetch('/api/post', { method: 'POST', body: fd });
                const data = await res.json().catch(() => ({}));
                if (res.ok && !data.err) {
                    form.reset();
                    renderPosts();
                } else {
                    alert('Failed to post comment: ' + (data.err || res.statusText));
                }
            } catch (err) {
                alert('Failed to post comment: ' + err);
            }
        });
    }

    function editPost(id) {
        window.location.href = `/post/edit/${id}`;
    }

    async function deletePost(id) {
        if (!confirm('Are you sure you want to delete this post?')) return;
        try {
            // Try the endpoint pattern '/post/delete/{id}' first, fall back to '/delete/post/{id}'
            let res = await fetch(`/api/post/delete/${id}`, { method: 'GET' });
            if (!res.ok) {
                console.log("Failed to delete", res.statusText);
            
            }
            // Reload page after delete attempt
            window.location.reload();
        } catch (err) {
            alert('Failed to delete post: ' + err);
        }
    }

    window.addEventListener("DOMContentLoaded", async () => {
        await fetchUsers();
        renderContacts();
        renderPosts();
        renderAuthorSelect();
        handleAuthorChange();
        handlePhotoVideo();
        handleFeeling();
        handleAddFeedForm();
        initPostOptions();
        initCommentHandlers();
    });
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "fb-blue": "#1877F2",
                        "fb-bg": "#F0F2F5",
                        "fb-header": "#FFFFFF",
                        "fb-active-tab": "#1877F2",
                        "fb-gray-text": "#65676B",
                        "fb-hover": "#E4E6EB",
                        "fb-input": "#F0F2F5",
                        "fb-comment-bg": "#F0F2F5",
                    },
                    fontFamily: {
                        "sans": ["Segoe UI", "Helvetica", "Arial", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-fb-bg text-[#050505];
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 28px;
        }
        .nav-icon-active {
            @apply text-fb-blue border-b-4 border-fb-blue;
        }
        .nav-icon-active span {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-dot {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 12px;
