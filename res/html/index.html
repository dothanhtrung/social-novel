<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>News Feed with Expanded Comments</title>
    <!-- <link href="/css/tailwind_output.min.css" rel="stylesheet"> -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
    let userMap = {};
    let userList = [];
    let usernameMapLower = {}; // map lowercase username -> user
    async function fetchUsers() {
        try {
            const res = await fetch("/api/character");
            const data = await res.json();
            if (data.characters) {
                userMap = {};
                userList = data.characters;
                for (const user of data.characters) {
                    userMap[user.id] = user;
                    if (user.username) usernameMapLower[user.username.toLowerCase()] = user;
                }
            }
        } catch (e) {
            userMap = {};
            userList = [];
        }
    }

    // Escape HTML special chars to prevent XSS when rendering user content
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Render content and replace @username mentions with full Name in blue
    function renderContentWithMentions(text) {
        if (!text) return '';
        // Escape first
        let out = escapeHtml(text);
        // Replace newlines with <br>
        out = out.replace(/\r?\n/g, '<br>');
        // Replace @username (alphanumeric and underscore, hyphen allowed) with full name when available
        out = out.replace(/@([A-Za-z0-9_\-\.]+)/g, function(_, uname) {
            const found = usernameMapLower[uname.toLowerCase()];
            if (found) {
                const display = escapeHtml(found.name || found.username);
                return `<span class="text-fb-blue">@${display}</span>`;
            }
            return `@${escapeHtml(uname)}`;
        });
        return out;
    }

    function getAvatarUrl(user) {
        if (user && user.username) {
            return `/data/avatar/${user.username}.png`;
        }
        // if (user && user.username) {
        //     return "https://ui-avatars.com/api/?name=" + encodeURIComponent(user.name || user.username);
        // }
        return "https://ui-avatars.com/api/?name=Unknown";
    }

    // Robust parser for backend timestamp strings like:
    // "2026-01-16 8:40:12.33977 +00:00:00"
    function parseTimestamp(s) {
        if (!s) return new Date();
        let str = String(s).trim();
        // Replace first space between date and time with 'T'
        str = str.replace(/^([0-9]{4}-[0-9]{2}-[0-9]{2})\s+/, '$1T');
        // Remove any extra space before timezone
        str = str.replace(/\s+([+-]\d{2}:\d{2}:?\d{0,2})$/, '$1');
        // Convert timezone like +00:00:00 to +00:00 (drop seconds)
        str = str.replace(/([+-]\d{2}:\d{2}):\d{2}$/, '$1');
        // Ensure hour has two digits (e.g. T8: -> T08:)
        str = str.replace(/T(\d):/, 'T0$1:');
        // If there's no timezone or Z, assume UTC
        if (!/[Zz]|[+-]\d{2}:\d{2}$/.test(str)) {
            str = str + 'Z';
        }
        const d = new Date(str);
        if (isNaN(d.getTime())) {
            // Try fallback by removing fractional seconds
            const alt = String(s).replace(/(\.[0-9]+)\s+/, ' ');
            const d2 = new Date(alt);
            if (!isNaN(d2.getTime())) return d2;
            return new Date(s);
        }
        return d;
    }

    // Friendly relative time like Facebook: few seconds ago, 15 minutes ago, 1 day ago, or 'Jan 16 at 17:04'
    function timeAgo(s) {
        const d = parseTimestamp(s);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000); // seconds
        if (diff < 10) return 'few seconds ago';
        if (diff < 60) return `${diff} seconds ago`;
        if (diff < 3600) {
            const m = Math.floor(diff / 60);
            return `${m} minute${m !== 1 ? 's' : ''} ago`;
        }
        if (diff < 86400) {
            const h = Math.floor(diff / 3600);
            return `${h} hour${h !== 1 ? 's' : ''} ago`;
        }
        if (diff < 604800) { // less than 7 days
            const days = Math.floor(diff / 86400);
            return `${days} day${days !== 1 ? 's' : ''} ago`;
        }
        // older: if same year, show 'Jan 16 at 17:04', else full date
        const nowYear = now.getFullYear();
        if (d.getFullYear() === nowYear) {
            return d.toLocaleString(undefined, { month: 'short', day: 'numeric' }) + ' at ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        }
        return d.toLocaleString();
    }

    function renderReactions(p) {
        const items = [];
        let total = 0;
        if (p.liked && p.liked > 0) { items.push({ color: '#1877F2', emoji: '👍', count: p.liked }); total += Number(p.liked); }
        if (p.loved && p.loved > 0) { items.push({ color: '#F3425E', emoji: '❤️', count: p.loved }); total += Number(p.loved); }
        if (p.haha && p.haha > 0) { items.push({ color: '#F7B500', emoji: '😂', count: p.haha }); total += Number(p.haha); }
        if (p.surprised && p.surprised > 0) { items.push({ color: '#9B8CFF', emoji: '😮', count: p.surprised }); total += Number(p.surprised); }
        if (p.sad && p.sad > 0) { items.push({ color: '#6E6E6E', emoji: '😢', count: p.sad }); total += Number(p.sad); }
        if (items.length === 0) return '';
        const icons = items.slice(0,3).map((it, idx) => `<span class='reaction-icon' style='background:${it.color}; z-index:${10 - idx}; margin-left:${idx === 0 ? 0 : -6}px'>${it.emoji}</span>`).join('');
        return `<span class='reaction-stack'>${icons}<span class='reaction-count'>${total}</span></span>`;
    }

    // Render reactions for comments: if none, render empty string; otherwise overlapped icons + total
    function renderCommentReactions(p) {
        const items = [];
        let total = 0;
        if (p.liked && p.liked > 0) { items.push({ color: '#1877F2', emoji: '👍', count: p.liked }); total += Number(p.liked); }
        if (p.loved && p.loved > 0) { items.push({ color: '#F3425E', emoji: '❤️', count: p.loved }); total += Number(p.loved); }
        if (p.haha && p.haha > 0) { items.push({ color: '#F7B500', emoji: '😂', count: p.haha }); total += Number(p.haha); }
        if (p.surprised && p.surprised > 0) { items.push({ color: '#9B8CFF', emoji: '😮', count: p.surprised }); total += Number(p.surprised); }
        if (p.sad && p.sad > 0) { items.push({ color: '#6E6E6E', emoji: '😢', count: p.sad }); total += Number(p.sad); }
        if (items.length === 0) return '';
        // show up to 3 icons overlapped
        const icons = items.slice(0,3).map((it, idx) => `<span class='reaction-icon' style='background:${it.color}; z-index:${10 - idx}; margin-left:${idx === 0 ? 0 : -6}px'>${it.emoji}</span>`).join('');
        return `<span class='reaction-stack'>${icons}<span class='reaction-count'>${total}</span></span>`;
    }

    async function renderContacts() {
        const contactsContainer = document.querySelector("[data-contacts-list]");
        if (!contactsContainer) return;
        try {
            const res = await fetch("/api/character");
            const data = await res.json();
            if (data.characters) {
                contactsContainer.innerHTML = data.characters.map(user => `
                <a class='flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-fb-hover transition-colors' href='#'>
                    <div class='relative size-9'>
                        <div class='w-full h-full rounded-full bg-cover bg-center' style='background-image: url("${getAvatarUrl(user)}");'></div>
                        <div class='active-dot'></div>
                    </div>
                    <span class='text-[15px] font-semibold'>${user.name || user.username}</span>
                </a>
            `).join("");
            }
        } catch (e) {
            contactsContainer.innerHTML = '<div class="text-red-500">Failed to load contacts</div>';
        }
    }

    async function renderPosts() {
        const postsContainer = document.querySelector("[data-posts-list]");
        if (!postsContainer) return;
        try {
            // Read page/count from URL (defaults page=1,count=20)
            const { page, count } = getPageParams();
            const params = new URLSearchParams(window.location.search);
            params.set('page', String(page));
            params.set('count', String(count));
            const postsApiUrl = '/api/post?' + params.toString();
            const res = await fetch(postsApiUrl);
            const data = await res.json();
            if (data.posts) {
                // Group posts by id and attach children as comments
                const posts = data.posts;
                const byId = {};
                for (const p of posts) {
                    byId[p.id] = { ...p, comments: [] };
                }
                const roots = [];
                for (const id in byId) {
                    const p = byId[id];
                    if (p.parent && p.parent > 0 && byId[p.parent]) {
                        byId[p.parent].comments.push(p);
                    } else {
                        roots.push(p);
                    }
                }

                // Sort comments for each post: oldest first (display from old -> new)
                Object.values(byId).forEach(post => {
                    if (post.comments && post.comments.length > 0) {
                        post.comments.sort((a, b) => {
                            const ta = parseTimestamp(a.updated_at || a.created_at);
                            const tb = parseTimestamp(b.updated_at || b.created_at);
                            return ta - tb; // oldest first
                        });
                    }
                });

                // Fetch media for all posts and nested comments (collect ids recursively)
                const allPostIds = [];
                function collectIds(node) {
                    allPostIds.push(node.id);
                    if (node.comments && node.comments.length > 0) {
                        node.comments.forEach(ch => collectIds(ch));
                    }
                }
                roots.forEach(r => collectIds(r));
                // Deduplicate
                const uniqIds = Array.from(new Set(allPostIds));
                await Promise.all(uniqIds.map(async id => {
                    try {
                        const mres = await fetch(`/api/media?post=${id}`);
                        const mdata = await mres.json().catch(() => ({}));
                        if (mdata && Array.isArray(mdata.media)) {
                            // attach to the corresponding byId entry
                            if (byId[id]) byId[id].media = mdata.media.map(m => ({
                                ...m,
                                url: (m.url && (m.url.startsWith('/') || m.url.startsWith('http'))) ? m.url : ('/data/' + m.url)
                            }));
                        }
                    } catch (err) {
                        // ignore per-item failures
                    }
                }));

                // Sort roots (top-level posts) by updated_at (newest first)
                roots.sort((a, b) => parseTimestamp(b.updated_at || b.created_at) - parseTimestamp(a.updated_at || a.created_at));

                function renderComment(c, depth = 0) {
                    const a = userMap[c.author] || { username: 'unknown', name: 'Unknown' };
                    // render media for comment if any
                    let commentMediaHtml = '';
                    if (c.media && c.media.length > 0) {
                        const m = c.media[0];
                        const mediaUrl = (m.url && (m.url.startsWith('/') || m.url.startsWith('http'))) ? m.url : ('/data/' + m.url);
                        if (m.file_type === "Image") {
                            commentMediaHtml = `<div class='mt-2'><img src="${mediaUrl}" class='w-full rounded-lg object-cover' alt='media' /></div>`;
                        } else if (m.file_type === "Video") {
                            commentMediaHtml = `<div class='mt-2'><video src="${mediaUrl}" class='w-full rounded-lg' controls></video></div>`;
                        }
                    }

                    const indentStyle = depth > 0 ? `style="margin-left:${depth * 24}px"` : '';
                    const commentHtml = `
                    <div ${indentStyle} class="pr-4 py-3 border-t border-gray-100 bg-white relative">
                        <div class="flex items-start gap-3">
                            <div class="size-8 rounded-full bg-cover bg-center" style="background-image: url('${getAvatarUrl(a)}')"></div>
                            <div class="flex-1">
                                <div class="text-[14px] text-[#050505]"><strong>${a.name || a.username}</strong></div>
                                        <div class="text-[14px] text-fb-gray-text">${renderContentWithMentions(c.content || '')}</div>
                                        ${commentMediaHtml}
                                        <div class="mt-1 flex items-center justify-between">
                                            <div class="flex items-center gap-3">
                                                <p class='text-[12px] text-fb-gray-text' title='${new Date(c.updated_at || c.created_at).toLocaleString()}'>${timeAgo(c.updated_at || c.created_at)}</p>
                                                <button class='text-[13px] text-fb-blue hover:underline reply-btn' data-comment-id='${c.id}'>Reply</button>
                                            </div>
                                            <div>
                                                ${renderCommentReactions(c)}
                                            </div>
                                        </div>
                            </div>
                            <div class='relative ml-2'>
                                <button class='options-btn p-1 rounded-full hover:bg-fb-hover' data-post-id='${c.id}' aria-label='Comment Options'>
                                    <span class='material-symbols-outlined' style='font-size:16px'>more_horiz</span>
                                </button>
                                <div class='options-menu hidden absolute w-28 bg-white rounded shadow-md z-50' style='right:12px; top:8px;'>
                                    <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-edit' data-post-id='${c.id}'>Edit</button>
                                    <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-delete' data-post-id='${c.id}'>Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>`;

                    // Render child comments recursively
                    let childrenHtml = '';
                    if (c.comments && c.comments.length > 0) {
                        childrenHtml = c.comments.map(child => renderComment(child, depth + 1)).join('');
                    }
                    return commentHtml + childrenHtml;
                }

                function renderPost(p) {
                    const a = userMap[p.author] || { username: 'unknown', name: 'Unknown' };
                    // Build 'is {feeling} {is_with}' metadata
                    const feeling = p.feeling || '';
                    const is_with = p.is_with || '';
                    let metaHtml = '';
                    if (feeling || is_with) {
                        const feelingHtml = feeling ? `<span class='text-fb-blue'>${feeling}</span>` : '';
                        let isWithHtml = '';
                        if (is_with) {
                            const m = is_with.match(/^(with|by)\s+(.*)/i);
                            if (m) {
                                const prefix = `<span class='text-fb-gray-text'>${m[1]}</span>`;
                                const rest = m[2].split(/\s+and\s+/i).map((part, i) => {
                                    return (i ? `<span class='text-fb-gray-text'> and </span>` : '') + `<span class='text-fb-blue'>${part}</span>`;
                                }).join('');
                                isWithHtml = `${prefix} ${rest}`;
                            } else {
                                isWithHtml = is_with.split(/\s+and\s+/i).map((part, i) => {
                                    return (i ? `<span class='text-fb-gray-text'> and </span>` : '') + `<span class='text-fb-blue'>${part}</span>`;
                                }).join('');
                            }
                        }
                        metaHtml = `<span class='text-[13px] ml-2 align-middle'><span class='text-fb-gray-text'>is</span> ${feelingHtml}${isWithHtml ? ' ' + isWithHtml : ''}</span>`;
                    }
                    let mediaHtml = '';
                    if (p.media && p.media.length > 0) {
                        const m = p.media[0];
                        const mediaUrl = (m.url && (m.url.startsWith('/') || m.url.startsWith('http'))) ? m.url : ('/data/' + m.url);
                        if (m.file_type === "Image") {
                            mediaHtml = `<div class='w-full mt-2'><img src="${mediaUrl}" class='w-full rounded-lg object-cover' alt='media' /></div>`;
                        } else if (m.file_type === "Video") {
                            mediaHtml = `<div class='w-full mt-2'><video src="${mediaUrl}" class='w-full rounded-lg' controls></video></div>`;
                        }
                    }
                    const commentsHtml = (p.comments && p.comments.length > 0) ? p.comments.map(c => renderComment(c, 0)).join('') : '';
                    return `
                    <div class='bg-white rounded-lg shadow-sm border border-gray-200 mb-4'>
                        <div class='px-4 py-3'>
                            <div class='flex items-center justify-between'>
                                <div class='flex items-center gap-2'>
                                    <div class='size-10 rounded-full bg-cover bg-center' style='background-image: url("${getAvatarUrl(a)}");'></div>
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <h4 class='text-[15px] font-bold hover:underline cursor-pointer text-[#050505]'>${a.name || a.username}</h4>
                                            ${metaHtml}
                                        </div>
                                        <p class='text-[13px] text-fb-gray-text flex items-center gap-1 mt-0'>
                                            ${timeAgo(p.updated_at || p.created_at)} <span class="text-[10px] text-fb-gray-text">•</span> <span class='material-symbols-outlined !text-[14px]'>public</span>
                                        </p>
                                    </div>
                                </div>
                                <div class='relative ml-2'>
                                    <button class='options-btn p-1 rounded-full hover:bg-fb-hover' data-post-id='${p.id}' aria-label='Options'>
                                        <span class='material-symbols-outlined' style='font-size:18px'>more_horiz</span>
                                    </button>
                                    <div class='options-menu hidden absolute w-36 bg-white rounded shadow-md z-50' style='right:12px; top:36px;'>
                                        <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-edit' data-post-id='${p.id}'>Edit</button>
                                        <button class='block w-full text-left px-3 py-2 hover:bg-fb-hover options-delete' data-post-id='${p.id}'>Delete</button>
                                    </div>
                                </div>
                            </div>
                            <p class='text-[15px] mt-2 mb-3'>${renderContentWithMentions(p.content || "")}</p>
                        </div>
                        ${mediaHtml}
                        <div class='px-4 pt-2'>
                            <div class='flex items-center gap-2'>
                                ${renderReactions(p)}
                            </div>
                        </div>
                        <div class='mx-4 border-y border-gray-100 flex items-center gap-1 py-1'>
                            <button class='flex-1 flex items-center justify-center gap-2 py-1.5 hover:bg-fb-hover rounded-lg transition-colors text-fb-gray-text'>
                                <span class='material-symbols-outlined !text-[20px]'>thumb_up</span>
                                <span class='text-[15px] font-semibold'>Like</span>
                            </button>
                            <button class='flex-1 flex items-center justify-center gap-2 py-1.5 hover:bg-fb-hover rounded-lg transition-colors text-[#1877F2]'>
                                <span class='material-symbols-outlined !text-[20px] !fill-1'>chat_bubble</span>
                            </button>
                            <button class='flex-1 flex items-center justify-center gap-2 py-1.5 hover:bg-fb-hover rounded-lg transition-colors text-fb-gray-text'>
                                <span class='material-symbols-outlined !text-[20px]'>share</span>
                                <span class='text-[15px] font-semibold'>Share</span>
                            </button>
                        </div>
                        ${commentsHtml}
                        <div class="px-4 py-3 border-t border-gray-100 bg-white">
                            <form class="comment-form flex items-start gap-3" data-parent-id="${p.id}" enctype="multipart/form-data">
                                <input type="hidden" name="id" value="0" />
                                <input type="hidden" name="is_with" value="" />
                                <input type="hidden" name="feeling" value="" />
                                <select name="author" class="w-28 px-2 py-1 border rounded">${userList.map(u => `<option value="${u.id}">${u.name||u.username}</option>`).join('')}</select>
                                <div class="flex-1">
                                    <textarea name="content" placeholder="Write a comment..." class="w-full px-3 py-2 border rounded resize-none" rows="2"></textarea>
                                    <div class="mt-2 flex items-center justify-between">
                                        <div class="flex items-center">
                                            <input type="file" name="media" accept="image/*,video/*" class="hidden comment-media-input" />
                                            <button type="button" class="comment-add-media px-2">📷</button>
                                        </div>
                                    </div>
                                    <div class="comment-reaction mt-2 flex items-center gap-1">
                                        <label class="text-sm">👍</label>
                                        <input name="liked" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                        <label class="text-sm">😂</label>
                                        <input name="haha" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                        <label class="text-sm">❤️</label>
                                        <input name="loved" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                        <label class="text-sm">😮</label>
                                        <input name="surprised" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                        <label class="text-sm">😢</label>
                                        <input name="sad" type="number" min="0" value="0" class="w-16 px-1 py-1 border rounded text-sm" />
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>`;
                }

                postsContainer.innerHTML = roots.map(renderPost).join('');
                // Render pager below the posts list
                renderPager(roots.length, page, count);
            }
        } catch (e) {
            postsContainer.innerHTML = '<div class="text-red-500">Failed to load posts</div>';
        }
    }

    // Parse page and count from URL query string, with defaults
    function getPageParams() {
        const params = new URLSearchParams(window.location.search);
        const page = Math.max(1, Number(params.get('page') || 1));
        const count = Math.max(1, Number(params.get('count') || 20));
        return { page, count };
    }

    // Update browser URL to reflect current page/count without reloading
    function updateUrlParams(page, count) {
        const params = new URLSearchParams(window.location.search);
        params.set('page', String(page));
        params.set('count', String(count));
        const newUrl = window.location.pathname + '?' + params.toString();
        window.history.pushState({}, '', newUrl);
    }

    // Render pagination controls. We don't have total posts from API, so allow next until empty result.
    function renderPager(returnedCount, page, count) {
        // Ensure a pager container exists after posts list
        let pager = document.getElementById('posts-pager');
        if (!pager) {
            pager = document.createElement('div');
            pager.id = 'posts-pager';
            pager.className = 'w-full flex items-center justify-center py-4';
            const postsList = document.querySelector('[data-posts-list]');
            if (postsList && postsList.parentElement) postsList.parentElement.appendChild(pager);
        }

        // If returnedCount is 0 and page > 1, we are past last page — move back
        if (returnedCount === 0 && page > 1) {
            // Go back one page silently
            page = Math.max(1, page - 1);
            updateUrlParams(page, count);
            // refetch
            renderPosts();
            return;
        }

        const isFirst = page <= 1;
        // If returnedCount < count, we assume this is the last page
        const isLast = returnedCount < count;

        pager.innerHTML = `
            <div class="flex items-center gap-2">
                <button id="pager-first" class="px-3 py-1 rounded border bg-white hover:bg-fb-hover" ${isFirst? 'disabled' : ''}>First</button>
                <button id="pager-prev" class="px-3 py-1 rounded border bg-white hover:bg-fb-hover" ${isFirst? 'disabled' : ''}>Prev</button>
                <div class="px-3">Page <strong>${page}</strong></div>
                <button id="pager-next" class="px-3 py-1 rounded border bg-white hover:bg-fb-hover" ${isLast? 'disabled' : ''}>Next</button>
                <button id="pager-last" class="px-3 py-1 rounded border bg-white hover:bg-fb-hover" ${isLast? 'disabled' : ''}>Last</button>
            </div>
        `;

        // Attach handlers
        pager.querySelector('#pager-first').addEventListener('click', () => {
            if (isFirst) return;
            updateUrlParams(1, count);
            renderPosts();
        });
        pager.querySelector('#pager-prev').addEventListener('click', () => {
            if (isFirst) return;
            const np = Math.max(1, page - 1);
            updateUrlParams(np, count);
            renderPosts();
        });
        pager.querySelector('#pager-next').addEventListener('click', () => {
            if (isLast) return;
            const np = page + 1;
            updateUrlParams(np, count);
            renderPosts();
        });
        pager.querySelector('#pager-last').addEventListener('click', async () => {
            // Try to find last page by exponential/backoff search
            // Start from current page and double until we get empty result
            let low = 1, high = page;
            // find a high that returns less than count (or empty)
            while (true) {
                const q = new URLSearchParams(window.location.search);
                q.set('page', String(high));
                q.set('count', String(count));
                const r = await fetch('/api/post?' + q.toString());
                const d = await r.json().catch(() => ({}));
                const got = (d.posts && d.posts.length) || 0;
                if (got === 0) break;
                if (got < count) { low = high; break; }
                low = high;
                high = high * 2;
                // avoid runaway
                if (high > 10000) break;
            }
            // binary search between low and high to find last non-empty
            let lo = low, hi = Math.max(high, low + 1);
            while (lo + 1 < hi) {
                const mid = Math.floor((lo + hi) / 2);
                const q = new URLSearchParams(window.location.search);
                q.set('page', String(mid));
                q.set('count', String(count));
                const r = await fetch('/api/post?' + q.toString());
                const d = await r.json().catch(() => ({}));
                const got = (d.posts && d.posts.length) || 0;
                if (got === 0) {
                    hi = mid;
                } else {
                    lo = mid;
                }
                if (hi - lo <= 1) break;
            }
            const lastPage = Math.max(1, lo);
            updateUrlParams(lastPage, count);
            renderPosts();
        });
    }

    function renderAuthorSelect() {
        const select = document.getElementById('author-select');
        if (!select) return;
        select.innerHTML = userList.map(user => `<option value="${user.id}">${user.name || user.username}</option>`).join("");
        // Set avatar for first user
        if (userList.length > 0) {
            setAuthorAvatar(userList[0]);
        }
        // Refresh username lower-case map in case userList changed
        usernameMapLower = {};
        for (const user of userList) if (user.username) usernameMapLower[user.username.toLowerCase()] = user;
    }

    function setAuthorAvatar(user) {
        const avatarDiv = document.getElementById('author-avatar');
        if (avatarDiv) {
            avatarDiv.style.backgroundImage = `url('${getAvatarUrl(user)}')`;
        }
    }

    function handleAuthorChange() {
        const select = document.getElementById('author-select');
        select.addEventListener('change', function() {
            const user = userMap[select.value];
            setAuthorAvatar(user);
        });
        // Optionally, make the select searchable (simple filter)
        select.addEventListener('input', function() {
            const val = select.value.toLowerCase();
            for (let i = 0; i < select.options.length; i++) {
                const option = select.options[i];
                const user = userMap[option.value];
                option.style.display = (user.name && user.name.toLowerCase().includes(val)) || (user.username && user.username.toLowerCase().includes(val)) ? '' : 'none';
            }
        });
    }

    function handlePhotoVideo() {
        const btn = document.getElementById('photo-video-btn');
        const input = document.getElementById('media-input');
        btn.addEventListener('click', () => input.click());
        input.addEventListener('change', function() {
            const preview = document.getElementById('media-preview');
            preview.innerHTML = '';
            for (const file of input.files) {
                const url = URL.createObjectURL(file);
                let el;
                if (file.type.startsWith('image/')) {
                    el = document.createElement('img');
                    el.src = url;
                    el.className = 'w-20 h-20 object-cover rounded-lg';
                } else if (file.type.startsWith('video/')) {
                    el = document.createElement('video');
                    el.src = url;
                    el.className = 'w-20 h-20 object-cover rounded-lg';
                    el.controls = true;
                }
                if (el) preview.appendChild(el);
            }
        });
    }

    function handleFeeling() {
        const btn = document.getElementById('feeling-btn');
        const input = document.getElementById('feeling-input');
        btn.addEventListener('click', () => {
            input.classList.toggle('hidden');
            if (!input.classList.contains('hidden')) input.focus();
        });
    }

    function handleAddFeedForm() {
        const form = document.getElementById('add-feed-form');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            // Add default values for required fields if missing
            if (!formData.get('author')) {
                formData.set('author', userList[0]?.id || '');
            }
            if (!formData.get('content')) {
                alert('Content cannot be empty.');
                return;
            }
            // Attach all selected media files
            const mediaInput = document.getElementById('media-input');
            for (const file of mediaInput.files) {
                formData.append('media', file);
            }
            // Add default values for other fields required by backend
            formData.set('id', '0');
            formData.set('parent', '0');
            formData.set('liked', '0');
            formData.set('haha', '0');
            formData.set('loved', '0');
            formData.set('surprised', '0');
            formData.set('sad', '0');
            const isWithVal = document.getElementById('is-with-input') ? document.getElementById('is-with-input').value : '';
            formData.set('is_with', isWithVal);
            try {
                const res = await fetch('/api/post', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.err) {
                    alert('Failed to post: ' + data.err);
                } else {
                    form.reset();
                    document.getElementById('media-preview').innerHTML = '';
                    document.getElementById('feeling-input').classList.add('hidden');
                    renderPosts();
                }
            } catch (err) {
                alert('Failed to post: ' + err);
            }
        });
    }

    function initPostOptions() {
        // Delegate click to toggle options menu
        document.addEventListener('click', function(e) {
            // Toggle menus when clicking options button
            if (e.target.closest && e.target.closest('.options-btn')) {
                e.preventDefault();
                const btn = e.target.closest('.options-btn');
                const menu = btn.parentElement.querySelector('.options-menu');
                if (menu) menu.classList.toggle('hidden');
                return;
            }

            
            // Click on edit
            if (e.target.closest && e.target.closest('.options-edit')) {
                e.preventDefault();
                const id = e.target.closest('.options-edit').dataset.postId;
                editPost(id);
                return;
            }
            // Click on delete
            if (e.target.closest && e.target.closest('.options-delete')) {
                e.preventDefault();
                const id = e.target.closest('.options-delete').dataset.postId;
                deletePost(id);
                return;
            }
            // Click outside: close any open menus
            if (!e.target.closest || !e.target.closest('.options-menu')) {
                document.querySelectorAll('.options-menu').forEach(m => m.classList.add('hidden'));
            }
        });
    }

    window.initCommentHandlers = function() {
        // Media button triggers file input for comment forms
        document.addEventListener('click', function(e) {
            const btn = e.target.closest && e.target.closest('.comment-add-media');
            if (btn) {
                e.preventDefault();
                const form = btn.closest('.comment-form');
                if (!form) return;
                const input = form.querySelector('.comment-media-input');
                if (input) input.click();
            }
            // Reply button: set the parent id on the nearest comment form and focus textarea
            const reply = e.target.closest && e.target.closest('.reply-btn');
            if (reply) {
                e.preventDefault();
                const commentId = reply.dataset.commentId;
                // Find the nearest post container that contains a comment form
                // Walk up until we find an ancestor that has a .comment-form inside it
                let ancestor = reply.closest('.bg-white');
                let form = null;
                while (ancestor) {
                    form = ancestor.querySelector && ancestor.querySelector('.comment-form');
                    if (form) break;
                    ancestor = ancestor.parentElement && ancestor.parentElement.closest ? ancestor.parentElement.closest('.bg-white') : null;
                }
                // Fallback to any comment-form on the page (shouldn't usually happen)
                if (!form) form = document.querySelector('.comment-form');
                if (form) {
                    form.dataset.parentId = commentId;
                    const ta = form.querySelector('textarea[name="content"]');
                    if (ta) {
                        ta.focus();
                        // Optionally prefill with @username
                        try {
                            const commenter = userMap[reply.dataset.commentId];
                            if (commenter && commenter.username) {
                                ta.value = ta.value ? ta.value : `@${commenter.username} `;
                            }
                        } catch (err) {}
                    }
                }
            }
        });

        // Submit comment forms (Enter to submit, Shift+Enter for newline)
        document.addEventListener('keydown', function(e) {
            const ta = e.target && e.target.closest && e.target.closest('.comment-form') ? e.target : null;
            if (!ta || ta.tagName !== 'TEXTAREA') return;
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const form = ta.closest('.comment-form');
                if (form) {
                    if (typeof form.requestSubmit === 'function') {
                        form.requestSubmit();
                    } else {
                        form.dispatchEvent(new Event('submit', { cancelable: true }));
                    }
                }
            }
        });

        // Use capture phase to reliably intercept native submits before navigation
        document.addEventListener('submit', async function(e) {
            const form = e.target.closest && e.target.closest('.comment-form');
            if (!form) return;
            e.preventDefault();
            const parentId = form.dataset.parentId || '0';
            const fd = new FormData();
            const author = form.querySelector('select[name="author"]')?.value || '';
            const is_with = form.querySelector('select[name="is_with"]')?.value || '';
            const feeling = form.querySelector('select[name="feeling"]')?.value || '';
            const content = form.querySelector('textarea[name="content"]')?.value || '';
            const likedVal = form.querySelector('input[name="liked"]')?.value || '0';
            const hahaVal = form.querySelector('input[name="haha"]')?.value || '0';
            const lovedVal = form.querySelector('input[name="loved"]')?.value || '0';
            const surprisedVal = form.querySelector('input[name="surprised"]')?.value || '0';
            const sadVal = form.querySelector('input[name="sad"]')?.value || '0';
            fd.set('author', author);
            fd.set('content', content);
            fd.set('is_with', is_with);
            fd.set('feeling', feeling);
            fd.set('parent', parentId);
            fd.set('id', '0');
            fd.set('liked', String(Number(likedVal) || 0));
            fd.set('haha', String(Number(hahaVal) || 0));
            fd.set('loved', String(Number(lovedVal) || 0));
            fd.set('surprised', String(Number(surprisedVal) || 0));
            fd.set('sad', String(Number(sadVal) || 0));
            const mediaInput = form.querySelector('.comment-media-input');
            if (mediaInput && mediaInput.files && mediaInput.files.length > 0) {
                for (const f of mediaInput.files) fd.append('media', f);
            }
            try {
                console.log("Submitting comment: ", fd);
                const res = await fetch('/api/post', { method: 'POST', body: fd });
                const data = await res.json().catch(() => ({}));
                if (res.ok && !data.err) {
                    // Clear and reload the page so counts update
                    form.reset();
                    window.location.reload();
                } else {
                    alert('Failed to post comment: ' + (data.err || res.statusText));
                }
            } catch (err) {
                alert('Failed to post comment: ' + err);
            }
        });
    }

    function editPost(id) {
        window.location.href = `/post/edit/${id}`;
    }

    async function deletePost(id) {
        if (!confirm('Are you sure you want to delete this post?')) return;
        try {
            // Try the endpoint pattern '/post/delete/{id}' first, fall back to '/delete/post/{id}'
            let res = await fetch(`/api/post/delete/${id}`, { method: 'GET' });
            if (!res.ok) {
                console.log("Failed to delete", res.statusText);
            
            }
            // Reload page after delete attempt
            window.location.reload();
        } catch (err) {
            alert('Failed to delete post: ' + err);
        }
    }

        await fetchUsers();
        renderContacts();
        renderPosts();
        renderAuthorSelect();
        handleAuthorChange();
        handlePhotoVideo();
        handleFeeling();
        handleAddFeedForm();
        initPostOptions();
        initCommentHandlers();
    });
