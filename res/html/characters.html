<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Characters - Social Novel</title>

    <link href="/css/tailwind_output.min.css" rel="stylesheet">
    <link href="/css/post.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/js/utils.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "fb-blue": "#1877F2",
                        "fb-bg": "#F0F2F5",
                        "fb-header": "#FFFFFF",
                        "fb-active-tab": "#1877F2",
                        "fb-gray-text": "#65676B",
                        "fb-hover": "#E4E6EB",
                        "fb-input": "#F0F2F5",
                        "fb-comment-bg": "#F0F2F5",
                    },
                    fontFamily: {
                        "sans": ["Segoe UI", "Helvetica", "Arial", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-fb-bg text-[#050505];
            }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 28px;
        }

        .nav-icon-active {
            @apply text-fb-blue border-b-4 border-fb-blue;
        }

        .nav-icon-active span {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="min-h-screen">
<div class="layout-container flex flex-col min-h-screen">
    <header class="sticky top-0 z-50 w-full bg-white shadow-sm px-4 h-14">
        <div class="max-w-[100%] mx-auto flex items-center justify-between h-full">
            <div class="flex items-center gap-2 min-w-[300px]">
                <div class="text-fb-blue">
                    <a href="/">
                        <svg class="size-10" fill="currentColor" viewBox="0 0 36 36">
                            <path
                                    d="M20.181 35.89C29.094 34.791 36 27.197 36 18 36 8.059 27.941 0 18 0S0 8.059 0 18c0 8.513 5.913 15.644 13.875 17.373v-12.28h-4.462v-5.093h4.462v-3.877c0-4.404 2.623-6.84 6.642-6.84 1.924 0 3.93.344 3.93.344v4.32h-2.213c-2.181 0-2.86 1.355-2.86 2.744v3.309h4.87l-.779 5.093h-4.091v12.28z">
                            </path>
                        </svg>
                    </a>
                </div>
                <div class="relative group">
                        <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-fb-gray-text !text-[20px]">search</span>
                    <input class="bg-[#F0F2F5] border-none rounded-full pl-10 pr-4 py-2 text-[15px] focus:ring-0 w-[240px]"
                           placeholder="Search" type="text"/>
                </div>
            </div>
            <div class="flex-1 hidden md:flex items-center justify-center h-full max-w-[680px]">
                <div class="flex items-center w-full h-full">
                    <a class="flex-1 h-full flex items-center justify-center text-fb-gray-text hover:bg-fb-hover rounded-lg transition-colors mx-1"
                       href="/">
                        <span class="material-symbols-outlined">home</span>
                    </a>
                    <a class="flex-1 h-full flex items-center justify-center nav-icon-active hover:bg-fb-hover rounded-lg transition-colors mx-1"
                       href="/characters">
                        <span class="material-symbols-outlined">groups</span>
                    </a>
                    <a class="flex-1 h-full flex items-center justify-center text-fb-gray-text hover:bg-fb-hover rounded-lg transition-colors mx-1"
                       href="#">
                        <span class="material-symbols-outlined">ondemand_video</span>
                    </a>
                    <a class="flex-1 h-full flex items-center justify-center text-fb-gray-text hover:bg-fb-hover rounded-lg transition-colors mx-1"
                       href="#">
                        <span class="material-symbols-outlined">storefront</span>
                    </a>
                    <a class="flex-1 h-full flex items-center justify-center text-fb-gray-text hover:bg-fb-hover rounded-lg transition-colors mx-1"
                       href="#">
                        <span class="material-symbols-outlined">sports_esports</span>
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-2 min-w-[300px] justify-end">
                <div class="flex items-center gap-2">
                    <button
                            class="size-10 rounded-full bg-[#E4E6EB] flex items-center justify-center hover:bg-[#D8DADF]">
                        <span class="material-symbols-outlined !text-[20px]">apps</span>
                    </button>
                    <button
                            class="size-10 rounded-full bg-[#E4E6EB] flex items-center justify-center hover:bg-[#D8DADF]">
                            <span
                                    class="material-symbols-outlined !text-[20px]">chat_bubble</span>
                    </button>
                    <button
                            class="size-10 rounded-full bg-[#E4E6EB] flex items-center justify-center hover:bg-[#D8DADF] relative">
                            <span
                                    class="material-symbols-outlined !text-[20px]">notifications</span>
                        <span
                                class="absolute -top-1 -right-1 size-5 bg-[#E41E3F] text-white text-[11px] font-bold rounded-full flex items-center justify-center">3</span>
                    </button>
                    <div class="size-10 rounded-full bg-cover bg-center cursor-pointer ml-1"
                         style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA-Xm9lgA5v0jrawnFlL5-BnVIf9cGcnqMgb74GP5AvQUaxNOC2VlSIBePe7SnrZmobPfc9dQyb9ZjasZmvGvR9Ae0i3fmBQTiKUKY4BXloOipwi684ATsjDTyKxKlK79pLLcCUQv_EFNK7D4OwDh0JBJYCdZvVkfSnq6vPT17XedYad9SbE6tct5dt2BANas7S2HZMCfPcNUpJ_dpTH_3QdlbWGF8bhnr60d33l_ix-ENAl1o2Ixut3a8rD8lN88Z_SGEcFH7RBSRD');">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full flex justify-center px-4">
        <section class="flex-1 flex flex-col pt-6 max-w-6xl mx-auto min-w-0 w-full">
            <!-- Add Character Section -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6 p-6">
                <h2 class="text-[20px] font-bold mb-4">Add / Update Character</h2>
                <form id="character-form" class="space-y-4" enctype="multipart/form-data" method="POST"
                      action="/api/character">
                    <input hidden name="id" type="number" value="0" required/>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[15px] font-semibold mb-2">Username</label>
                            <input name="username" type="text"
                                   class="w-full px-4 py-2 bg-[#F0F2F5] rounded-lg text-[15px] text-[#050505] focus:outline-none border border-gray-200"
                                   required/>
                        </div>

                        <div>
                            <label class="block text-[15px] font-semibold mb-2">Name</label>
                            <input name="name" type="text"
                                   class="w-full px-4 py-2 bg-[#F0F2F5] rounded-lg text-[15px] text-[#050505] focus:outline-none border border-gray-200"
                                   required/>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[15px] font-semibold mb-2">Avatar (optional)</label>
                        <input name="avatar" type="file" accept="image/*"
                               class="w-full px-4 py-2 bg-[#F0F2F5] rounded-lg text-[15px] focus:outline-none border border-gray-200"/>
                    </div>

                    <button type="submit"
                            class="bg-fb-blue hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                        Submit
                    </button>
                </form>
            </div>

            <!-- Characters Grid -->
            <div class="mb-6">
                <h2 class="text-[20px] font-bold mb-4">Characters</h2>
                <div id="character-grid"
                     class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    async function fetchCharacters() {
        try {
            const res = await fetch("/api/character");
            const data = await res.json();

            if (data.err) {
                alert("Error: " + data.err);
                return;
            }

            const grid = document.getElementById("character-grid");
            grid.innerHTML = ""; // clear grid

            data.characters.forEach(char => {
                const card = document.createElement("div");
                card.className = "bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow";

                const linkContainer = document.createElement("a");
                linkContainer.href = `/character/${char.id}`;
                linkContainer.className = "flex flex-col items-center p-4 hover:bg-fb-hover transition-colors";

                const img = document.createElement("img");
                img.src = getAvatarUrl(char);
                img.alt = char.name;
                img.className = "w-24 h-24 object-cover rounded-full mb-3 border-2 border-fb-blue";

                const name = document.createElement("div");
                name.textContent = char.name;
                name.className = "text-center font-semibold text-[15px] text-[#050505] mb-1 truncate w-full";

                const username = document.createElement("div");
                username.textContent = "@" + char.username;
                username.className = "text-center text-fb-gray-text text-[13px] mb-2 truncate w-full";

                linkContainer.appendChild(img);
                linkContainer.appendChild(name);
                linkContainer.appendChild(username);

                const delBtn = document.createElement("button");
                delBtn.textContent = "Delete";
                delBtn.className = "w-full bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm font-semibold transition-colors";
                delBtn.onclick = async (e) => {
                    e.preventDefault();
                    const confirmed = confirm(`Delete character "${char.name}"?`);
                    if (!confirmed) return;

                    try {
                        const res = await fetch(`/api/character/delete/${char.id}`);
                        const text = await res.text();
                        fetchCharacters(); // refresh
                    } catch (err) {
                        alert("Delete failed: " + err);
                    }
                };

                card.appendChild(linkContainer);
                card.appendChild(delBtn);
                grid.appendChild(card);
            });
        } catch (err) {
            alert("Failed to fetch characters: " + err);
        }
    }

    // Handle form submit via JS to prevent full reload
    document.getElementById("character-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);

        try {
            const res = await fetch(form.action, {
                method: "POST",
                body: formData
            });

            if (!res.ok) throw new Error(await res.text());

            form.reset();
            fetchCharacters();
        } catch (err) {
            alert("Failed to save character: " + err.message);
        }
    });

    fetchCharacters(); // Load on page start
</script>
</body>

</html>
