{% include "include/header.html" %}

{% include "include/dashboard.html" %}

<body class="bg-gray-800 min-h-screen p-4">
<h1 class="text-2xl font-bold mb-4">Characters</h1>

<form id="character-form" class="bg-white p-4 rounded shadow max-w-xl space-y-4" enctype="multipart/form-data" method="POST" action="/api/character">
    <h2 class="text-xl font-bold">Add / Update Character</h2>

    <div>
        <input hidden name="id" type="number" class="w-full border border-gray-300 rounded px-3 py-2" value="0" required />
    </div>

    <div>
        <label class="block font-medium mb-1">Username</label>
        <input name="username" type="text" class="w-full border border-gray-300 rounded px-3 py-2" required />
    </div>

    <div>
        <label class="block font-medium mb-1">Name</label>
        <input name="name" type="text" class="w-full border border-gray-300 rounded px-3 py-2" required />
    </div>

    <div>
        <label class="block font-medium mb-1">Avatar (optional)</label>
        <input name="avatar" type="file" accept="image/*" class="w-full" />
    </div>

    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
        Submit
    </button>
</form>

<div id="character-grid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-7 gap-4">
    <!-- Cards will be injected here -->
</div>

<script>
    async function fetchCharacters() {
        try {
            const res = await fetch("/api/character");
            const data = await res.json();

            if (data.err) {
                alert("Error: " + data.err);
                return;
            }

            const grid = document.getElementById("character-grid");
            grid.innerHTML = ""; // clear grid

            data.characters.forEach(char => {
                const card = document.createElement("div");
                card.className = "bg-white p-2 rounded shadow flex flex-col items-center";

                const img = document.createElement("img");
                img.src = `/data/avatar/${char.username}.png`;
                img.alt = char.name;
                img.className = "w-24 h-24 object-cover rounded-full mb-2";

                const name = document.createElement("div");
                name.textContent = char.name;
                name.className = "text-center font-medium mb-2";

                const a = document.createElement("a");
                a.href = `/character/${char.id}`;
                a.appendChild(img);
                a.appendChild(name);

                const delBtn = document.createElement("button");
                delBtn.textContent = "Delete";
                delBtn.className = "bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm";
                delBtn.onclick = async () => {
                    const confirmed = confirm(`Delete character "${char.name}"?`);
                    if (!confirmed) return;

                    try {
                        const res = await fetch(`/api/character/delete/${char.id}`);
                        const text = await res.text();
                        fetchCharacters(); // refresh
                    } catch (err) {
                        alert("Delete failed: " + err);
                    }
                };

                // card.appendChild(img);
                card.appendChild(a);
                card.appendChild(delBtn);

                grid.appendChild(card);
            });
        } catch (err) {
            alert("Failed to fetch characters: " + err);
        }
    }

    // Optional: Handle form submit via JS to prevent full reload
    document.getElementById("character-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);

        try {
            const res = await fetch(form.action, {
                method: "POST",
                body: formData
            });

            if (!res.ok) throw new Error(await res.text());

            form.reset();
            fetchCharacters();
        } catch (err) {
            alert("Failed to save character: " + err.message);
        }
    });

    fetchCharacters(); // Load on page start
</script>
</body>
</html>
