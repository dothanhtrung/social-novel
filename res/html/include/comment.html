<!-- Comment Input Form -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mt-4">
    <form id="comment-form" enctype="multipart/form-data">
        <!-- Hidden fields -->
        <input name="id" type="hidden" value="0">
        <input name="parent" type="hidden" value="${post.id}">
        <input name="liked" type="hidden" value="0">
        <input name="haha" type="hidden" value="0">
        <input name="loved" type="hidden" value="0">
        <input name="surprised" type="hidden" value="0">
        <input name="sad" type="hidden" value="0">
        <input name="feeling" type="hidden" value="">
        <input name="is_with" type="hidden" value="">

        <div class="flex items-start space-x-3">
            <!-- Avatar Selection -->
            <div class="relative">
                <input name="author" type="hidden" value="1">
                <div id="avatar-selector" class="w-10 h-10 rounded-full bg-gray-300 cursor-pointer hover:opacity-80 transition-opacity overflow-hidden">
                    <img id="selected-avatar" src="/data/avatar/default.png" alt="Avatar" class="w-full h-full object-cover">
                </div>

                <!-- Character Selection Dropdown -->
                <div id="character-dropdown" class="hidden absolute top-12 left-0 bg-white border border-gray-200 rounded-lg shadow-lg z-10 w-64 max-h-60 overflow-y-auto">
                    <!-- Character options will be populated here -->
                </div>
            </div>

            <!-- Comment Content -->
            <div class="flex-1">
                <textarea
                        name="content"
                        id="comment-textarea"
                        placeholder="Write a comment..."
                        rows="1"
                        class="w-full border-0 resize-none focus:ring-0 focus:outline-none bg-gray-100 rounded-full px-4 py-2 placeholder-gray-500"
                ></textarea>

                <!-- Attachment and Submit Row -->
                <div class="flex items-center justify-between mt-2 px-4">
                    <div class="flex items-center space-x-2">
                        <!-- Attach Image Button -->
                        <label for="comment-media" class="cursor-pointer text-gray-500 hover:text-gray-700">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M19 7v2.99s-1.99.01-2 0V7c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-5.01c.01-.99 2-.99 2 0V19c0 2.2-1.8 4-4 4H5c-2.2 0-4-1.8-4-4V7c0-2.2 1.8-4 4-4h12c2.2 0 4 1.8 4 4zM8 11.5l2.5 3.01L14.5 10l4.5 6H5l3-4.5z"/>
                            </svg>
                        </label>
                        <input name="media" id="comment-media" type="file" accept="image/*" class="hidden" multiple>

                        <!-- Selected files indicator -->
                        <span id="files-indicator" class="text-sm text-gray-500 hidden"></span>
                    </div>

                    <!-- Submit Button (hidden by default) -->
                    <button type="submit" id="comment-submit" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded-full text-sm font-medium">
                        Post
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    let characters = [];

    // Load characters
    async function loadCharacters() {
        try {
            const res = await fetch("/api/character");
            const data = await res.json();
            if (data.characters && Array.isArray(data.characters)) {
                characters = data.characters;
                populateCharacterDropdown();
            }
        } catch (err) {
            console.error("Failed to load characters:", err);
        }
    }

    // Populate character dropdown
    function populateCharacterDropdown() {
        const dropdown = document.getElementById('character-dropdown');
        dropdown.innerHTML = '';

        characters.forEach(char => {
            const option = document.createElement('div');
            option.className = 'flex items-center p-2 hover:bg-gray-100 cursor-pointer';
            option.innerHTML = `
            <img src="/data/avatar/${char.username}.png" alt="${char.name}" class="w-8 h-8 rounded-full mr-3 object-cover">
            <div>
                <div class="font-medium text-sm">${char.name}</div>
                <div class="text-gray-500 text-xs">@${char.username}</div>
            </div>
        `;

            option.addEventListener('click', () => {
                selectCharacter(char);
                toggleCharacterDropdown(false);
            });

            dropdown.appendChild(option);
        });
    }

    // Select character
    function selectCharacter(char) {
        document.querySelector('input[name="author"]').value = char.id;
        document.getElementById('selected-avatar').src = `/data/avatar/${char.username}.png`;
        document.getElementById('selected-avatar').alt = char.name;
    }

    // Toggle character dropdown
    function toggleCharacterDropdown(show = null) {
        const dropdown = document.getElementById('character-dropdown');
        if (show === null) {
            dropdown.classList.toggle('hidden');
        } else {
            dropdown.classList.toggle('hidden', !show);
        }
    }

    // Avatar selector click handler
    document.getElementById('avatar-selector').addEventListener('click', () => {
        toggleCharacterDropdown();
    });

    // Click outside to close dropdown
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#avatar-selector') && !e.target.closest('#character-dropdown')) {
            toggleCharacterDropdown(false);
        }
    });

    // Textarea auto-resize and show/hide submit button
    const textarea = document.getElementById('comment-textarea');
    const submitBtn = document.getElementById('comment-submit');

    textarea.addEventListener('input', function() {
        // Auto-resize
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';

        // Show/hide submit button
        if (this.value.trim()) {
            submitBtn.classList.remove('hidden');
        } else {
            submitBtn.classList.add('hidden');
        }
    });

    // Enter key to submit (Shift+Enter for new line)
    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (this.value.trim()) {
                document.getElementById('comment-form').dispatchEvent(new Event('submit'));
            }
        }
    });

    // File selection indicator
    document.getElementById('comment-media').addEventListener('change', function() {
        const indicator = document.getElementById('files-indicator');
        if (this.files.length > 0) {
            indicator.textContent = `${this.files.length} file(s) selected`;
            indicator.classList.remove('hidden');
        } else {
            indicator.classList.add('hidden');
        }
    });

    // Form submission
    document.getElementById('comment-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);

        try {
            const res = await fetch('/api/post/', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                // Reset form
                textarea.value = '';
                textarea.style.height = 'auto';
                submitBtn.classList.add('hidden');
                document.getElementById('comment-media').value = '';
                document.getElementById('files-indicator').classList.add('hidden');

                // Reload page or refresh comments
                location.reload();
            } else {
                const error = await res.text();
                console.error('Failed to post comment:', error);
                alert('Failed to post comment');
            }
        } catch (err) {
            console.error('Error posting comment:', err);
            alert('Error posting comment');
        }
    });

    // Load characters on page load
    loadCharacters();
</script>
