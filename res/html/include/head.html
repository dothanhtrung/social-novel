<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{ title | default(value="Social Novel") }}</title>

    <link href="/css/tailwind_output.min.css" rel="stylesheet">
    <link href="/css/post.css" rel="stylesheet">
    <link href="/css/components.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="/js/utils.js"></script>
<!--    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>-->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&amp;display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "fb-blue": "#1877F2",
                        "fb-bg": "#F0F2F5",
                        "fb-header": "#FFFFFF",
                        "fb-active-tab": "#1877F2",
                        "fb-gray-text": "#65676B",
                        "fb-hover": "#E4E6EB",
                        "fb-input": "#F0F2F5",
                        "fb-comment-bg": "#F0F2F5",
                    },
                    fontFamily: {
                        "sans": ["Segoe UI", "Helvetica", "Arial", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-fb-bg text-[#050505];
            }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 28px;
        }

        .nav-icon-active {
            @apply text-fb-blue border-b-4 border-fb-blue;
        }

        .nav-icon-active span {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .active-dot {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 12px;
            height: 12px;
            background-color: #31A24C;
            border: 2px solid white;
            border-radius: 50%;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .comment-bubble {
            @apply bg-fb-comment-bg rounded-[18px] px-3 py-2;
        }

        /* Reaction stack for comments (overlapped icons) */
        .reaction-stack {
            display: inline-flex;
            align-items: center;
        }

        .reaction-stack .reaction-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            border: 2px solid white;
            margin-left: -6px;
        }

        .reaction-count {
            margin-left: 8px;
            color: #65676B;
            font-size: 13px;
        }
    </style>
