<!DOCTYPE html>
<html lang="en">
<head>
    {% include "include/header.html" %}
    <title>Social Novel - {{character.name}}</title>
</head>
<body>

{% include "include/dashboard.html" %}

<form action="/update/character" method="post" enctype="multipart/form-data">
    <div class="space-y-12">
        <div class="border-b border-gray-900/10 pb-12">
            <h2 class="text-base font-semibold leading-7 text-gray-900">{{character.name}}</h2>
            <!--            <p class="mt-1 text-sm leading-6 text-gray-600">This information will be displayed publicly so be careful what you share.</p>-->

            <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                <div class="sm:col-span-4">
                    <label for="name" class="block text-sm font-medium leading-6 text-gray-900">{{character.username}}</label>
<!--                    <div class="mt-2">-->
<!--                        <div class="flex rounded-md shadow-sm ring-1 ring-inset ring-gray-300 focus-within:ring-2 focus-within:ring-inset focus-within:ring-indigo-600 sm:max-w-md">-->
                            <input type="hidden" name="username" id="username" value="{{character.username}}">
<!--                        </div>-->
<!--                    </div>-->
                    <div class="mt-2">
                        <div class="flex rounded-md shadow-sm ring-1 ring-inset ring-gray-300 focus-within:ring-2 focus-within:ring-inset focus-within:ring-indigo-600 sm:max-w-md">
                            <input value="{{character.name}}" type="text" name="name" id="name" autocomplete="name" class="block flex-1 border-0 bg-transparent py-1.5 pl-1 text-gray-900 placeholder:text-gray-400 focus:ring-0 sm:text-sm sm:leading-6" placeholder="{{character.name}}">
                        </div>
                    </div>
                </div>

                <div class="col-span-full">
                    <label for="avatar" class="block text-sm font-medium leading-6 text-gray-900">Avatar</label>
                    <div class="mt-2 flex items-center gap-x-3">
                        <img class="h-12 w-12 text-gray-300" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" src="/img/avatar/{{character.username}}.png">

                        <label type="button" class="rounded-md bg-white px-2.5 py-1.5 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
                            <span>Change</span>
                            <input id="avatar" name="avatar" type="file" class="sr-only">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-x-6">
        <!--        <button type="button" class="text-sm font-semibold leading-6 text-gray-900">Cancel</button>-->
        <button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Update</button>
    </div>
</form>

<!--dashboard close tag-->
</div>
</main>
</div>

</body>
</html>
