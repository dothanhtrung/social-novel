
{% include "include/header.html" %}
{% include "include/dashboard.html" %}

<body class="bg-gray-100 min-h-screen p-4 flex justify-center items-start">

<form id="character-form" class="bg-white p-6 rounded shadow max-w-xl w-full space-y-4" enctype="multipart/form-data" method="POST" action="/api/character">
    <h2 class="text-2xl font-bold">Edit Character</h2>

    <div>
        <input hidden name="id" type="number" class="w-full border border-gray-300 rounded px-3 py-2" required readonly />
    </div>

    <div>
        <label class="block font-medium mb-1">Username</label>
        <input name="username" type="text" class="w-full border border-gray-300 rounded px-3 py-2" required />
    </div>

    <div>
        <label class="block font-medium mb-1">Name</label>
        <input name="name" type="text" class="w-full border border-gray-300 rounded px-3 py-2" required />
    </div>

    <div>
        <label class="block font-medium mb-1">Current Avatar</label>
        <img id="current-avatar" src="" alt="Avatar" class="w-24 h-24 object-cover rounded-full border mb-2" />
    </div>

    <div>
        <label class="block font-medium mb-1">Upload New Avatar (optional)</label>
        <input name="avatar" type="file" accept="image/*" class="w-full" />
    </div>

    <div class="flex gap-4">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Save
        </button>
        <button type="button" id="delete-btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">
            Delete
        </button>
    </div>
</form>

<script>
    const form = document.getElementById("character-form");
    const avatarImg = document.getElementById("current-avatar");
    const deleteBtn = document.getElementById("delete-btn");

    // Extract {id} from URL ("/character/123")
    const match = window.location.pathname.match(/\/character\/(\d+)/);
    if (!match) {
        alert("Invalid URL: character ID not found");
        throw new Error("Missing character ID");
    }
    const charId = match[1];

    async function loadCharacter() {
        try {
            const res = await fetch(`/api/character/${charId}`);
            const data = await res.json();

            if (data.err) {
                alert("Error: " + data.err);
                return;
            }

            const char = data.characters[0];

            form.elements["id"].value = char.id;
            form.elements["username"].value = char.username;
            form.elements["name"].value = char.name;
            avatarImg.src = `/data/avatar/${char.username}.png`;
        } catch (err) {
            alert("Failed to load character: " + err);
        }
    }

    // Handle form submission
    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        try {
            const res = await fetch(form.action, {
                method: "POST",
                body: formData
            });

            if (!res.ok) throw new Error(await res.text());

            loadCharacter(); // reload avatar in case username changed
        } catch (err) {
            alert("Failed to update: " + err.message);
        }
    });

    // Handle delete
    deleteBtn.addEventListener("click", async () => {
        const confirmed = confirm("Are you sure you want to delete this character?");
        if (!confirmed) return;

        try {
            const res = await fetch(`/api/character/delete/${charId}`);
            const text = await res.text();
            alert("Deleted: " + text);
            window.location.href = "/"; // redirect after deletion
        } catch (err) {
            alert("Failed to delete: " + err.message);
        }
    });

    // Initial load
    loadCharacter();
</script>

</body>
</html>
