{% include "include/header.html" %}
{% include "include/dashboard.html" %}


<form id="post-form" action="/api/post" method="POST" enctype="multipart/form-data" class="max-w-2xl mx-auto bg-white p-6 rounded shadow space-y-4">
    <h2 class="text-xl font-bold">Create New Post</h2>

    <!-- Character (autocomplete by username) -->
    <input name="id" type="number" value=0 hidden />
    <input name="parent" type="number" value=0 hidden />
    <div>
        <label for="character" class="block font-medium mb-1">Character (by username)</label>
        <input list="character-list" autocomplete="off" name="author" id="character" class="w-full border border-gray-300 rounded px-3 py-2" required />
        <datalist id="character-list">
            <!-- Options will be inserted via JS -->
        </datalist>
    </div>

    <!-- Feeling -->
    <div>
        <label for="feeling" class="block font-medium mb-1">Feeling</label>
        <input id="feeling" name="feeling" type="text" class="w-full border border-gray-300 rounded px-3 py-2" />
    </div>

    <!-- Is With -->
    <div>
        <label for="is_with" class="block font-medium mb-1">Is With</label>
        <input id="is_with" name="is_with" type="text"
               placeholder="Type character names separated by commas"
               class="w-full border border-gray-300 rounded px-3 py-2"  />
    </div>

    <!-- Content -->
    <div>
        <textarea name="content" placeholder="What's on your mind?" rows=9 class="w-full border border-gray-300 rounded px-3 py-2 h-48 resize-vertical"></textarea>
    </div>

    <!-- Media -->
    <div>
        <input name="media" type="file" accept="image/*" class="w-full" multiple />
    </div>

    <!-- Reactions -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4">
        <div>
            <label class="block text-center text-2xl">👍</label>
            <input name="liked" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">😂</label>
            <input name="haha" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">❤️</label>
            <input name="loved" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">😮</label>
            <input name="surprised" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">😢</label>
            <input name="sad" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
    </div>

    <!-- Submit -->
    <div class="text-right">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Submit</button>
    </div>
</form>

<script>
    async function checkForEdit() {
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId) {
            try {
                const res = await fetch(`/api/post?id=${postId}`);
                const data = await res.json();

                if (data.posts && data.posts.length > 0) {
                    const post = data.posts[0];

                    // Update form title
                    document.querySelector('h2').textContent = 'Edit Post';

                    // Populate form fields
                    document.querySelector('input[name="id"]').value = post.id || 0;
                    document.querySelector('input[name="parent"]').value = post.parent || 0;
                    document.querySelector('input[name="author"]').value = post.author || '';
                    document.querySelector('input[name="feeling"]').value = post.feeling || '';
                    document.querySelector('input[name="is_with"]').value = post.is_with || '';
                    document.querySelector('textarea[name="content"]').value = post.content || '';

                    // Populate reaction counts
                    document.querySelector('input[name="liked"]').value = post.liked || 0;
                    document.querySelector('input[name="haha"]').value = post.haha || 0;
                    document.querySelector('input[name="loved"]').value = post.loved || 0;
                    document.querySelector('input[name="surprised"]').value = post.surprised || 0;
                    document.querySelector('input[name="sad"]').value = post.sad || 0;
                } else if (data.err) {
                    console.error('Error loading post:', data.err);
                    alert('Error loading post: ' + data.err);
                }
            } catch (err) {
                console.error('Failed to load post data:', err);
                alert('Failed to load post data');
            }
        }
    }


    // Fetch characters and populate datalist
    async function fetchCharacters() {
        try {
            const res = await fetch("/api/character");
            const data = await res.json();

            if (data.characters && Array.isArray(data.characters)) {
                const datalist = document.getElementById("character-list");
                datalist.innerHTML = ""; // clear old

                data.characters.forEach(c => {
                    const option = document.createElement("option");
                    option.value = c.id;
                    option.textContent = `${c.name} (${c.username})`;
                    option.dataset.id = c.id;
                    datalist.appendChild(option);
                });
            } else {
                alert("Invalid character data");
            }
        } catch (err) {
            console.error("Failed to load characters:", err);
        }
    }

    fetchCharacters().then(() => checkForEdit());
</script>

<script>
    document.getElementById('post-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);

        try {
            const res = await fetch('/api/post', {
                method: 'POST',
                body: formData,
            });

            if (res.ok) {
                location.reload(); // Reload on success
            } else {
                const err = await res.text();
                console.log('Failed to submit: ' + err);
            }
        } catch (err) {
            console.log(err);
        }
    });
</script>
