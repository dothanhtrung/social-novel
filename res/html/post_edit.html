{% include "include/header.html" %}
{% include "include/dashboard.html" %}

<form id="post-form" action="/api/post" method="POST" enctype="multipart/form-data" class="max-w-2xl mx-auto bg-white p-6 rounded shadow space-y-4">
    <h2 class="text-xl font-bold">Edit Post</h2>

    <!-- Hidden ids -->
    <input name="id" type="number" value="0" hidden />
    <input name="parent" type="number" value="0" hidden />

    <!-- Author (searchable select) -->
    <div>
        <label for="author-search" class="block font-medium mb-1">Author</label>
        <input id="author-search" placeholder="Search by name or username" class="w-full border border-gray-300 rounded px-3 py-2 mb-2" />
        <select id="author-select" name="author" class="w-full border border-gray-300 rounded px-3 py-2" required>
            <!-- Options inserted by JS -->
        </select>
    </div>

    <!-- Timestamp -->
    <div>
        <label for="updated_at" class="block font-medium mb-1">Timestamp</label>
        <input id="updated_at" name="updated_at" type="datetime-local" class="w-full border border-gray-300 rounded px-3 py-2" />
        <p class="text-sm text-fb-gray-text mt-1">Edit the post timestamp (local).</p>
    </div>

    <!-- Feeling -->
    <div>
        <label for="feeling" class="block font-medium mb-1">Feeling</label>
        <input id="feeling" name="feeling" type="text" class="w-full border border-gray-300 rounded px-3 py-2" />
    </div>

    <!-- Is With -->
    <div>
        <label for="is_with" class="block font-medium mb-1">Is With</label>
        <input id="is_with" name="is_with" type="text"
               placeholder="Type character names separated by commas"
               class="w-full border border-gray-300 rounded px-3 py-2"  />
    </div>

    <!-- Content -->
    <div>
        <label for="content" class="block font-medium mb-1">Content</label>
        <textarea id="content" name="content" placeholder="What's on your mind?" rows=9 class="w-full border border-gray-300 rounded px-3 py-2 h-48 resize-vertical"></textarea>
    </div>

    <!-- Media (optional) -->
    <div>
        <label class="block font-medium mb-1">Attach media</label>
        <input name="media" type="file" accept="image/*,video/*" class="w-full" multiple />
    </div>

    <!-- Reactions -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4">
        <div>
            <label class="block text-center text-2xl">👍</label>
            <input id="liked" name="liked" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">😂</label>
            <input id="haha" name="haha" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">❤️</label>
            <input id="loved" name="loved" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">😮</label>
            <input id="surprised" name="surprised" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
        <div>
            <label class="block text-center text-2xl">😢</label>
            <input id="sad" name="sad" type="number" min="0" value="0" class="w-full border border-gray-300 rounded px-2 py-1 text-center" />
        </div>
    </div>

    <!-- Submit -->
    <div class="flex items-center justify-between">
        <a href="/" class="text-fb-gray-text hover:underline">Cancel</a>
        <div>
            <button id="delete-btn" type="button" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded mr-2">Delete</button>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Save</button>
        </div>
    </div>
</form>

<script>
// Helpers to parse backend timestamps similar to index.html
function normalizeBackendToDate(s) {
    if (!s) return null;
    let str = String(s).trim();
    str = str.replace(/^([0-9]{4}-[0-9]{2}-[0-9]{2})\s+/, '$1T');
    str = str.replace(/\s+([+-]\d{2}:\d{2}:?\d{0,2})$/, '$1');
    str = str.replace(/([+-]\d{2}:\d{2}):\d{2}$/, '$1');
    str = str.replace(/T(\d):/, 'T0$1:');
    if (!/[Zz]|[+-]\d{2}:\d{2}$/.test(str)) {
        str = str + 'Z';
    }
    const d = new Date(str);
    if (isNaN(d.getTime())) return null;
    return d;
}

function toDateTimeLocalValue(d) {
    if (!d) return '';
    const pad = (n) => String(n).padStart(2, '0');
    const yyyy = d.getFullYear();
    const mm = pad(d.getMonth() + 1);
    const dd = pad(d.getDate());
    const hh = pad(d.getHours());
    const min = pad(d.getMinutes());
    // omit seconds for simplicity
    return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
}

function toBackendTimestampFromLocal(value) {
    if (!value) return '';
    // value is like "2026-01-16T08:40" in local time
    const d = new Date(value);
    // Use ISO string (UTC) as backend-friendly format
    return d.toISOString();
}

// Populate author select and add simple search filter
async function fetchCharactersPopulate() {
    try {
        const res = await fetch('/api/character');
        const data = await res.json();
        if (!data.characters) return;
        const select = document.getElementById('author-select');
        const search = document.getElementById('author-search');
        select.innerHTML = '';
        data.characters.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.name || c.username} (${c.username})`;
            select.appendChild(opt);
        });
        // search filter
        search.addEventListener('input', function() {
            const q = this.value.toLowerCase();
            for (const opt of select.options) {
                opt.style.display = (opt.textContent.toLowerCase().includes(q)) ? '' : 'none';
            }
            // if first visible option exists, set select value to it
            const visible = Array.from(select.options).find(o => o.style.display !== 'none');
            if (visible) select.value = visible.value;
        });
    } catch (err) {
        console.error('Failed to load characters', err);
    }
}

// Load post if id is present in query param or in path (/post/edit/{id})
async function loadPostForEdit() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');
    if (!id) {
        // Try to extract from pathname like /post/edit/123
        const m = window.location.pathname.match(/\/post\/edit\/(\d+)/);
        if (m) id = m[1];
    }
    if (!id) return;
    try {
        const res = await fetch(`/api/post/?id=${id}`);
        const data = await res.json();
        if (data.posts && data.posts.length > 0) {
            const post = data.posts[0];
            document.querySelector('input[name="id"]').value = post.id || 0;
            document.querySelector('input[name="parent"]').value = post.parent || 0;
            // set author after select is populated
            // set feelings / content
            document.getElementById('feeling').value = post.feeling || '';
            document.getElementById('is_with').value = post.is_with || '';
            document.getElementById('content').value = post.content || '';
            document.getElementById('liked').value = post.liked || 0;
            document.getElementById('haha').value = post.haha || 0;
            document.getElementById('loved').value = post.loved || 0;
            document.getElementById('surprised').value = post.surprised || 0;
            document.getElementById('sad').value = post.sad || 0;
            // timestamp
            const d = normalizeBackendToDate(post.updated_at || post.created_at);
            if (d) document.getElementById('updated_at').value = toDateTimeLocalValue(d);
            // set author selection after a tick (when select populated)
            setTimeout(() => {
                const sel = document.getElementById('author-select');
                if (sel) sel.value = post.author || '';
            }, 200);
        } else if (data.err) {
            alert('Error loading post: ' + data.err);
        }
    } catch (err) {
        console.error('Failed to load post:', err);
    }
}

// Submit handler
document.getElementById('post-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    // convert datetime-local to backend timestamp
    const dt = document.getElementById('updated_at').value;
    if (dt) {
        formData.set('updated_at', toBackendTimestampFromLocal(dt));
    }
    try {
        const res = await fetch('/api/post', {
            method: 'POST',
            body: formData
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && (!data.err)) {
            // redirect back to home
            window.location.href = '/';
        } else {
            alert('Failed to save post: ' + (data.err || res.statusText));
        }
    } catch (err) {
        alert('Failed to save post: ' + err);
    }
});

// Delete handler
document.getElementById('delete-btn').addEventListener('click', async function() {
    const id = document.querySelector('input[name="id"]').value;
    if (!id || id === '0') {
        alert('No post selected to delete');
        return;
    }
    if (!confirm('Are you sure you want to delete this post?')) return;
    try {
        let res = await fetch(`/api/post/delete/${id}`, { method: 'GET' });
        if (!res.ok) {
		console.log("Failed to delete post", res.statusText);
	}
        window.location.href = '/';
    } catch (err) {
        alert('Failed to delete: ' + err);
    }
});

// Initialize
fetchCharactersPopulate().then(() => loadPostForEdit());
</script>
